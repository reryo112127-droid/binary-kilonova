<script>(function(){
var g=document.getElementById('products-grid');
if(!g)return;
var LIMIT=60,fetchOffset=0,isLoading=false,currentPeriod='month',currentRange={};

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getRange(period){
  var today=new Date(),toDate=fmt(today),fromDate;
  if(period==='today'){fromDate=toDate;}
  else if(period==='week'){var d=new Date(today);d.setDate(today.getDate()-6);fromDate=fmt(d);}
  else{var d=new Date(today);d.setDate(today.getDate()-30);fromDate=fmt(d);}
  return{fromDate:fromDate,toDate:toDate};
}
function setLoadMoreBtn(v){var b=document.getElementById('load-more-btn');if(b)b.style.display=v?'flex':'none';}
function cardHtml(p){
  var img=(p.main_image_url||'').replace(/pl\.jpg$/,'pt.jpg');
  var t=((p.title||'').substring(0,30)).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  var pid=encodeURIComponent(p.product_id||'');
  return '<div class="flex flex-col gap-1.5 cursor-pointer" onclick="location.href=\'/product/'+pid+'\'">'
    +'<div class="relative aspect-[3/4] w-full overflow-hidden rounded-lg bg-slate-200">'
    +(img?'<img class="h-full w-full object-cover object-left-top" src="'+img+'"/>':'')
    +'</div>'
    +'<p class="line-clamp-2 text-[11px] font-bold leading-tight">'+t+'</p></div>';
}
function loadProducts(){
  currentRange=getRange(currentPeriod);
  fetchOffset=0;
  if(window.__SSR_NEW_DATA__&&window.__SSR_NEW_DATA__.length&&currentPeriod==='month'){
    var _sd=window.__SSR_NEW_DATA__;window.__SSR_NEW_DATA__=null;
    var _hm=_sd.length>LIMIT;if(_hm)_sd=_sd.slice(0,LIMIT);
    g.innerHTML=_sd.length?_sd.map(cardHtml).join(''):'<p class="col-span-3 text-center text-slate-400 py-12 text-xs">この期間の作品がありません</p>';
    if(_sd.length){fetchOffset=LIMIT;setLoadMoreBtn(_hm);}
    return;
  }
  g.innerHTML='<p class="col-span-3 text-center text-slate-400 py-12 text-xs">読み込み中...</p>';
  setLoadMoreBtn(false);
  fetch('/api/products?sort=new&limit='+(LIMIT+1)+'&offset=0&fromDate='+currentRange.fromDate+'&toDate='+currentRange.toDate)
    .then(function(res){return res.json();})
    .then(function(d){
      var hasMore=d&&d.length>LIMIT;
      if(hasMore)d=d.slice(0,LIMIT);
      if(!d||!d.length){g.innerHTML='<p class="col-span-3 text-center text-slate-400 py-12 text-xs">この期間の作品がありません</p>';return;}
      g.innerHTML=d.map(cardHtml).join('');
      fetchOffset=LIMIT;
      setLoadMoreBtn(hasMore);
    }).catch(function(){g.innerHTML='<p class="col-span-3 text-center text-slate-400 py-12 text-xs">エラーが発生しました</p>';});
}
window.fetchMore=function(){
  if(isLoading)return;
  isLoading=true;
  var btn=document.getElementById('load-more-btn');
  if(btn){btn.textContent='読み込み中...';btn.disabled=true;}
  fetch('/api/products?sort=new&limit='+(LIMIT+1)+'&offset='+fetchOffset+'&fromDate='+currentRange.fromDate+'&toDate='+currentRange.toDate)
    .then(function(res){return res.json();})
    .then(function(d){
      var hasMore=d&&d.length>LIMIT;
      if(hasMore)d=d.slice(0,LIMIT);
      if(d&&d.length)g.insertAdjacentHTML('beforeend',d.map(cardHtml).join(''));
      fetchOffset+=LIMIT;
      setLoadMoreBtn(hasMore);
    }).catch(function(){})
    .finally(function(){isLoading=false;if(btn){btn.textContent='もっと見る';btn.disabled=false;}});
};
window.setPeriod=function(period){
  currentPeriod=period;
  ['today','week','month'].forEach(function(p){
    var btn=document.getElementById('btn-'+p);
    if(!btn)return;
    btn.className=p===period
      ?'flex-1 h-9 rounded-full text-xs font-bold bg-primary text-white transition-all'
      :'flex-1 h-9 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 transition-all';
  });
