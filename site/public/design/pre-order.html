<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>予約受付中 | AVランキング</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#ec5b13",
        "background-light": "#f8f6f6",
        "background-dark": "#1a110d",
      },
      fontFamily: { "display": ["Noto Sans JP", "Public Sans", "sans-serif"] },
      borderRadius: {"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
    },
  },
}
</script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen flex-col">
<!-- Header replaced by injectMobileLayout -->
<header></header>
<main class="px-3 py-4 pb-24">
  <div class="mb-4 flex items-center justify-between">
    <div>
      <h2 class="text-xl font-black tracking-tight">予約受付中</h2>
      <p id="product-count" class="text-xs text-slate-500 dark:text-slate-400">読み込み中...</p>
    </div>
  </div>
  <div id="product-grid" class="grid grid-cols-3 gap-2.5">
  </div>
  <div class="flex justify-center py-4 pb-28">
    <button id="load-more-btn" onclick="fetchMore()" style="display:none"
      class="w-full max-w-xs py-3 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-600 shadow-sm active:bg-gray-50">
      もっと見る
    </button>
  </div>
</main>
<!-- Bottom nav replaced by injectMobileLayout -->
<nav class="fixed bottom-0 left-0 right-0"></nav>
</div>
<script>
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function getPosterImageUrl(url) {
  if (!url) return '';
  if (url.includes('pb_e_')) return url.replace('pb_e_', 'pf_e_');
  return url;
}
function makeProductCard(p) {
  var id = p.product_id || '';
  var encId = encodeURIComponent(id);
  var img = getPosterImageUrl(p.main_image_url || '');
  var title = esc(p.title || '');
  var date = (p.sale_start_date || '').slice(0, 10);
  var noAct = !(p.actresses&&p.actresses.trim());
  return '<article class="group cursor-pointer" onclick="location.href=\'/product/'+encId+'\'">'+
    '<div class="aspect-[3/4] overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-800 relative mb-1.5 shadow-sm">'+
    (img ? '<img alt="" class="w-full h-full object-cover object-right block" src="'+esc(img)+'" loading="lazy"/>' : '')+
    '<span class="absolute top-1.5 left-1.5 bg-blue-600 text-white text-[8px] font-bold px-1 py-0.5 rounded shadow-sm">予約</span>'+
    '<div class="absolute bottom-1 right-1 flex gap-0.5">'+
    (noAct?'<button data-pid="'+esc(id)+'" class="bg-white/90 rounded-full p-0.5 shadow-sm" onclick="event.stopPropagation();location.href=\'/cast/register/\'+encodeURIComponent(this.dataset.pid)"><span class="material-symbols-outlined text-[11px]">add</span></button>':'')+
    '<button data-like-pid="'+esc(id)+'" class="bg-white/90 rounded-full p-0.5 shadow-sm" onclick="event.stopPropagation();toggleLike(this,this.dataset.likePid)">'+
    '<span class="material-symbols-outlined text-[11px]">favorite</span></button>'+
    '</div></div>'+
    '<h3 class="text-[10px] font-bold line-clamp-2 leading-tight mb-0.5 group-hover:text-primary transition-colors">'+title+'</h3>'+
    (date ? '<p class="text-[9px] text-slate-400">'+date+' 発売予定</p>' : '')+
    '</article>';
}
function skeletons() {
  return Array(12).fill('<div class="animate-pulse"><div class="aspect-[3/4] bg-slate-200 dark:bg-slate-700 rounded-xl mb-1.5"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-3/4 mb-0.5"></div></div>').join('');
}
var LIMIT=60, fetchOffset=0, isLoading=false, tomorrowStr='';
(function(){var d=new Date();d.setDate(d.getDate()+1);tomorrowStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
function setLoadMoreBtn(v){var b=document.getElementById('load-more-btn');if(b)b.style.display=v?'flex':'none';}
async function load() {
  var el=document.getElementById('product-grid');
  var cnt=document.getElementById('product-count');
  if(!el)return;
  fetchOffset=0;
  if(window.__SSR_PREORDER_DATA__&&window.__SSR_PREORDER_DATA__.length){
    var _pd=window.__SSR_PREORDER_DATA__;window.__SSR_PREORDER_DATA__=null;
    var _hm=_pd.length>LIMIT;if(_hm)_pd=_pd.slice(0,LIMIT);
    el.innerHTML=_pd.map(makeProductCard).join('');
    if(window.restoreLikes)window.restoreLikes();
    if(cnt)cnt.textContent=_pd.length+(_hm?'+':'')+'件';
    setLoadMoreBtn(_hm);fetchOffset=LIMIT;return;
  }
  el.innerHTML=skeletons();
  setLoadMoreBtn(false);
  try{
    var res=await fetch('/api/products?sort=pre-order&fromDate='+encodeURIComponent(tomorrowStr)+'&limit='+(LIMIT+1)+'&offset=0');
    var products=res.ok?await res.json():[];
    var hasMore=products.length>LIMIT;
    if(hasMore)products=products.slice(0,LIMIT);
    if(!products.length){el.innerHTML='<p class="col-span-full text-center py-12 text-slate-400 text-sm">予約作品が見つかりませんでした</p>';if(cnt)cnt.textContent='0件';return;}
    el.innerHTML=products.map(makeProductCard).join('');
    if(window.restoreLikes)window.restoreLikes();
    if(cnt)cnt.textContent=products.length+(hasMore?'+':'')+'件';
    setLoadMoreBtn(hasMore);
    fetchOffset=LIMIT;
  }catch(e){el.innerHTML='<p class="col-span-full text-center py-12 text-slate-400 text-sm">読み込みエラー</p>';}
}
window.fetchMore=async function(){
  if(isLoading)return;
  isLoading=true;
  var btn=document.getElementById('load-more-btn');
  if(btn){btn.textContent='読み込み中...';btn.disabled=true;}
  try{
    var res=await fetch('/api/products?sort=pre-order&fromDate='+encodeURIComponent(tomorrowStr)+'&limit='+(LIMIT+1)+'&offset='+fetchOffset);
    var products=res.ok?await res.json():[];
    var hasMore=products.length>LIMIT;
    if(hasMore)products=products.slice(0,LIMIT);
    var el=document.getElementById('product-grid');
    if(el&&products.length)el.insertAdjacentHTML('beforeend',products.map(makeProductCard).join(''));
    var cnt=document.getElementById('product-count');
    if(cnt){var cur=parseInt(cnt.textContent)||0;cnt.textContent=(cur+products.length)+(hasMore?'+':'')+'件';}
    fetchOffset+=LIMIT;
    setLoadMoreBtn(hasMore);
  }catch(e){}
  isLoading=false;
  if(btn){btn.textContent='もっと見る';btn.disabled=false;}
};
load();
</script>
</body>
</html>
