<script>(function(){
var actressName=decodeURIComponent(window.location.pathname.replace(/^\/actress\//,''));
if(!actressName)return;
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function calcAge(b){if(!b)return null;var d=new Date(b),t=new Date(),a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a;}
function fmtBday(b){if(!b)return'';var p=b.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}

// セッションID（いいね用）
var sid=localStorage.getItem('avr_sid');
if(!sid){sid=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('avr_sid',sid);}

var nameEl=document.getElementById('actress-name');
var infoEl=document.getElementById('actress-info-text');
var snsEl=document.getElementById('actress-sns');
var extraEl=document.getElementById('actress-extra');
var photoEl=document.getElementById('actress-photo');
var likeBtn=document.getElementById('actress-like-btn');

if(nameEl)nameEl.textContent=actressName;

// プロフィール取得
fetch('/api/actress/'+encodeURIComponent(actressName)).then(function(r){return r.json();}).then(function(p){
  if(nameEl)nameEl.textContent=p.name||actressName;

  // 写真
  if(photoEl&&p.image_url){photoEl.src=p.image_url;photoEl.alt=p.name||actressName;}

  // 基本情報
  if(infoEl){
    var parts=[];
    if(p.birthday){var age=calcAge(p.birthday);parts.push((age?age+'歳 ':'')+'('+fmtBday(p.birthday)+')');}
    var sz=[];
    if(p.height)sz.push('T'+p.height);
    if(p.bust)sz.push('B'+p.bust+(p.cup?'('+p.cup+'カップ)':''));
    if(p.waist)sz.push('W'+p.waist);
    if(p.hip)sz.push('H'+p.hip);
    if(sz.length)parts.push(sz.join(' '));
    if(p.blood_type)parts.push(p.blood_type+'型');
    if(p.prefectures)parts.push(p.prefectures);
    infoEl.innerHTML=parts.map(function(s){return'<span>'+esc(s)+'</span>';}).join('');
  }

  // SNS
  if(snsEl){
    var html='';
    if(p.twitter)html+='<a href="https://x.com/'+esc(p.twitter)+'" target="_blank" rel="noopener" class="flex items-center gap-1 px-1.5 py-0.5 bg-slate-900 text-white rounded text-[9px] font-bold"><span class="material-symbols-outlined text-[10px]">crossword</span><span>X</span></a>';
    if(p.instagram)html+='<a href="https://www.instagram.com/'+esc(p.instagram)+'" target="_blank" rel="noopener" class="flex items-center gap-1 px-1.5 py-0.5 bg-gradient-to-r from-purple-500 to-orange-500 text-white rounded text-[9px] font-bold"><span class="material-symbols-outlined text-[10px]">camera_alt</span><span>IG</span></a>';
    if(p.tiktok)html+='<a href="https://www.tiktok.com/@'+esc(p.tiktok)+'" target="_blank" rel="noopener" class="flex items-center gap-1 px-1.5 py-0.5 bg-black text-white rounded text-[9px] font-bold"><span class="text-[9px] font-bold">TikTok</span></a>';
    snsEl.innerHTML=html;
  }

  // 別名義・豊胸バッジ・趣味
  if(extraEl){
    var html='';
    if(p.augmented)html+='<span class="px-1.5 py-0.5 bg-pink-100 text-pink-600 text-[8px] font-bold rounded-full border border-pink-200">豊胸</span>';
    if(p.aliases&&p.aliases.length)html+='<span class="text-[9px] text-slate-400 leading-tight">旧名：'+p.aliases.map(function(a){return'<span class="underline cursor-pointer" onclick="location.href=\'/actress/'+encodeURIComponent(a)+'\'">'+esc(a)+'</span>';}).join('・')+'</span>';
    if(p.hobby)html+='<span class="text-[9px] text-slate-400 leading-tight">趣味：'+esc(p.hobby)+'</span>';
    extraEl.innerHTML=html;
  }

  // いいね
  if(likeBtn){
    var likeIcon=likeBtn.querySelector('.material-symbols-outlined');
    fetch('/api/like/actress/'+encodeURIComponent(p.name||actressName)).then(function(r){return r.json();}).then(function(ld){
      if(ld.liked&&likeIcon){likeIcon.style.fontVariationSettings="'FILL' 1";likeBtn.classList.add('text-primary');}
      if(ld.count!=null){
        var cntEl=document.createElement('span');cntEl.className='text-[8px] ml-0.5';cntEl.textContent=ld.count>0?ld.count:'';
        likeBtn.appendChild(cntEl);
      }
    }).catch(function(){});
    likeBtn.onclick=function(){
      var name=p.name||actressName;
      fetch('/api/like/actress/'+encodeURIComponent(name),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})}).then(function(r){return r.json();}).then(function(ld){
        var icon=likeBtn.querySelector('.material-symbols-outlined');
        if(icon)icon.style.fontVariationSettings=ld.liked?"'FILL' 1":"'FILL' 0";
        if(ld.liked)likeBtn.classList.add('text-primary'); else likeBtn.classList.remove('text-primary');
        var cntEl=likeBtn.querySelector('span.text-\\[8px\\]');
        if(cntEl&&ld.count!=null)cntEl.textContent=ld.count>0?ld.count:'';
      }).catch(function(){});
    };
  }
}).catch(function(){});

// 作品一覧取得
var grid=document.getElementById('products-grid');
if(grid){
  grid.innerHTML='';
  fetch('/api/products?actress='+encodeURIComponent(actressName)+'&sort=new&limit=30').then(function(r){return r.json();}).then(function(items){
    if(!items||!items.length){grid.innerHTML='<p class="col-span-3 text-center text-slate-400 py-8 text-xs">作品がありません</p>';return;}
    grid.innerHTML=items.map(function(p){
      var img=p.main_image_url||'';
      var t=esc((p.title||'').substring(0,30));
      var pid=encodeURIComponent(p.product_id||'');
      var genres=p.genres||'';
      var isAmateur=genres.includes('素人')||genres.includes('ハメ撮り');
      var isNew=p.sale_start_date&&(Date.now()-new Date(p.sale_start_date).getTime())<30*24*3600*1000;
      var badge=isAmateur?'<div class="absolute top-1 left-1 px-1 py-0.5 bg-orange-500 text-white text-[7px] font-bold rounded-sm">素人</div>'
               :isNew?'<div class="absolute top-1 left-1 px-1 py-0.5 bg-primary text-white text-[7px] font-bold rounded-sm">新作</div>':'';
      return '<div class="flex flex-col gap-1 cursor-pointer" onclick="location.href=\'/product/'+pid+'\'">'
        +'<div class="relative aspect-[3/4] w-full overflow-hidden rounded-md bg-slate-200">'
        +(img?'<img class="h-full w-full object-cover" src="'+img+'"/>':'')
        +badge+'</div>'
        +'<p class="line-clamp-2 text-[10px] font-bold leading-tight">'+t+'</p></div>';
    }).join('');
  }).catch(function(){grid.innerHTML='<p class="col-span-3 text-center text-slate-400 py-8 text-xs">エラーが発生しました</p>';});
}
})();
</script>
</body></html>
