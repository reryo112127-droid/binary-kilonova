<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>セール作品 | AVランキング</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#ec5b13",
        "background-light": "#f8f6f6",
        "background-dark": "#221610",
      },
      fontFamily: { "display": ["Public Sans", "sans-serif"] },
      borderRadius: {"DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px"},
    },
  },
}
</script>
<style>
body { font-family: 'Public Sans', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.active-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen flex-col overflow-x-hidden">
<header></header>
<main class="flex-1 pb-28">

<!-- ヒーローバナー -->
<div class="bg-gradient-to-r from-red-600 to-red-500 px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <span class="material-symbols-outlined text-white text-[22px] active-icon">local_offer</span>
    <div>
      <p class="text-white font-black text-base leading-none">セール中</p>
      <p class="text-red-100 text-[10px] mt-0.5">FANZA割引作品 最大<span id="max-discount">50</span>% OFF</p>
    </div>
  </div>
  <div class="text-right">
    <p class="text-white font-black text-xl leading-none" id="total-count">-</p>
    <p class="text-red-100 text-[10px]">件</p>
  </div>
</div>

<!-- フィルター: 割引率 -->
<div class="flex gap-2 px-4 py-3 overflow-x-auto no-scrollbar">
  <button id="filter-all" onclick="setDiscount(0)" class="flex-none h-8 px-3 rounded-full text-xs font-bold bg-red-500 text-white transition-all">すべて</button>
  <button id="filter-10" onclick="setDiscount(10)" class="flex-none h-8 px-3 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-600 transition-all">10%以上</button>
  <button id="filter-20" onclick="setDiscount(20)" class="flex-none h-8 px-3 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-600 transition-all">20%以上</button>
  <button id="filter-30" onclick="setDiscount(30)" class="flex-none h-8 px-3 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-600 transition-all">30%以上</button>
  <button id="filter-50" onclick="setDiscount(50)" class="flex-none h-8 px-3 rounded-full text-xs font-bold bg-white border border-slate-200 text-slate-600 transition-all">50%以上</button>
</div>

<!-- 作品グリッド -->
<div class="grid grid-cols-3 gap-x-2 gap-y-4 px-3" id="sale-grid">
  <div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>
  <div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>
  <div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>
  <div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>
  <div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>
  <div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>
</div>

<!-- もっと見るボタン -->
<div class="flex justify-center py-4">
  <button id="load-more-btn" onclick="fetchMore()" style="display:none"
    class="w-full max-w-xs mx-3 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 shadow-sm active:bg-slate-50">
    もっと見る
  </button>
</div>

</main>
<nav class="fixed bottom-0 left-0 right-0 z-50"></nav>
</div>

<script>(function(){
var g = document.getElementById('sale-grid');
if (!g) return;
var LIMIT = 60, fetchOffset = 0, isLoading = false, currentDiscount = 0;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function poster(url) {
  if (!url) return '';
  if (url.includes('pb_e_')) return url.replace('pb_e_','pf_e_');
  if (url.includes('/digital/amateur/') && url.endsWith('jm.jpg')) return url.replace('jm.jpg','jp-001.jpg');
  return url;
}
function purl(id) { return '/product/' + encodeURIComponent(id); }
function setLoadMoreBtn(v) { var b = document.getElementById('load-more-btn'); if (b) b.style.display = v ? 'flex' : 'none'; }

function discountColor(d) {
  if (d >= 50) return 'bg-red-600';
  if (d >= 30) return 'bg-red-500';
  if (d >= 20) return 'bg-orange-500';
  return 'bg-orange-400';
}

function fmtEndDate(s) {
  if (!s) return '';
  var d = new Date(s.replace(' ', 'T'));
  if (isNaN(d)) return '';
  var now = new Date();
  var diff = Math.ceil((d - now) / (1000 * 60 * 60 * 24));
  var label = (d.getMonth()+1) + '/' + d.getDate() + 'まで';
  if (diff <= 1) return '<span style="color:#dc2626;font-weight:900;font-size:9px;">本日終了</span>';
  if (diff <= 3) return '<span style="color:#dc2626;font-size:9px;font-weight:700;">⏰ ' + label + '</span>';
  return '<span style="color:#6b7280;font-size:9px;">' + label + '</span>';
}

function cardHtml(p) {
  var img = poster(p.main_image_url || '');
  var disc = parseInt(p.discount_pct) || 0;
  var listP = parseInt(p.list_price) || 0;
  var curP = parseInt(p.current_price) || 0;
  var pid = encodeURIComponent(p.product_id || '');
  var endLabel = fmtEndDate(p.sale_end_date || '');
  return '<a href="/product/' + pid + '" class="flex flex-col gap-1 group">'
    + '<div class="relative aspect-[3/4] w-full overflow-hidden rounded-lg bg-slate-200 dark:bg-slate-700">'
    + (img ? '<img class="w-full h-full object-cover object-right block group-hover:scale-105 transition-transform duration-200" src="' + esc(img) + '" loading="lazy"/>' : '')
    + (disc ? '<span class="absolute top-1.5 left-1.5 ' + discountColor(disc) + ' text-white text-[9px] font-black px-1.5 py-0.5 rounded leading-none">' + disc + '%<br>OFF</span>' : '')
    + '<div class="absolute bottom-1.5 right-1.5 flex gap-1">'
    + '<button data-like-pid="'+esc(p.product_id||'')+'" onclick="event.preventDefault();event.stopPropagation();toggleLike(this,this.dataset.likePid)" class="w-6 h-6 flex items-center justify-center bg-white/90 rounded-full shadow text-primary hover:bg-primary hover:text-white transition-colors"><span class="material-symbols-outlined text-[14px]">favorite</span></button>'
    + '</div>'
    + '</div>'
    + (curP ? '<p class="text-[11px] font-black text-red-500 leading-none flex items-baseline gap-1 flex-wrap">¥' + curP.toLocaleString() + '<span class="text-[9px] font-normal text-slate-400 line-through">¥' + (listP||curP).toLocaleString() + '</span>' + (endLabel ? endLabel : '') + '</p>' : '')
    + '<p class="text-[10px] font-bold leading-tight line-clamp-2 text-slate-800 dark:text-slate-100">' + esc(p.title||'') + '</p>'
    + '</a>';
}

function buildUrl(offset) {
  var u = '/api/products?sort=discount&source=fanza&limit=' + (LIMIT+1) + '&offset=' + offset;
  if (currentDiscount > 0) u += '&minDiscount=' + currentDiscount;
  return u;
}

function load() {
  fetchOffset = 0;
  g.innerHTML = [1,2,3,4,5,6].map(function(){
    return '<div class="flex flex-col gap-1 animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-200 dark:bg-slate-700"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div><div class="h-2 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div></div>';
  }).join('');
  setLoadMoreBtn(false);
  fetch(buildUrl(0))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var hasMore = data && data.length > LIMIT;
      if (hasMore) data = data.slice(0, LIMIT);
      if (!data || !data.length) {
        g.innerHTML = '<p class="col-span-3 text-center text-slate-400 py-12 text-xs">セール作品がありません</p>';
        return;
      }
      // バナーの最大割引率を更新
      var maxD = data.reduce(function(m, p){ return Math.max(m, parseInt(p.discount_pct)||0); }, 0);
      var el = document.getElementById('max-discount');
      if (el && maxD) el.textContent = maxD;
      var cnt = document.getElementById('total-count');
      if (cnt) cnt.textContent = (hasMore ? LIMIT + '+' : data.length);
      g.innerHTML = data.map(cardHtml).join('');
      fetchOffset = LIMIT;
      setLoadMoreBtn(hasMore);
    })
    .catch(function(){ g.innerHTML = '<p class="col-span-3 text-center text-slate-400 py-12 text-xs">読み込みエラー</p>'; });
}

window.fetchMore = function() {
  if (isLoading) return;
  isLoading = true;
  var btn = document.getElementById('load-more-btn');
  if (btn) { btn.textContent = '読み込み中...'; btn.disabled = true; }
  fetch(buildUrl(fetchOffset))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var hasMore = data && data.length > LIMIT;
      if (hasMore) data = data.slice(0, LIMIT);
      if (data && data.length) g.insertAdjacentHTML('beforeend', data.map(cardHtml).join(''));
      fetchOffset += LIMIT;
      setLoadMoreBtn(hasMore);
    })
    .catch(function(){})
    .finally(function(){ isLoading = false; if (btn) { btn.textContent = 'もっと見る'; btn.disabled = false; } });
};

window.setDiscount = function(d) {
  currentDiscount = d;
  ['all','10','20','30','50'].forEach(function(k) {
    var btn = document.getElementById('filter-' + k);
    if (!btn) return;
    var active = (k === 'all' && d === 0) || (k !== 'all' && parseInt(k) === d);
    btn.className = 'flex-none h-8 px-3 rounded-full text-xs font-bold transition-all '
      + (active ? 'bg-red-500 text-white' : 'bg-white border border-slate-200 text-slate-600');
  });
  load();
};

load();
})();
</script>
</body>
</html>
