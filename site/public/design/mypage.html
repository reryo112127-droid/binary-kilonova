<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#ffffff",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Sans JP", "sans-serif"],
                        "body": ["Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            min-height: max(884px, 100dvh);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-body">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-xl bg-background-light dark:bg-background-dark">
<!-- Header -->
<div class="sticky top-0 z-10 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-slate-100 dark:border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">chevron_left</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">マイページ</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">search</span>
</button>
</div>
</div>
<!-- Navigation Tabs -->
<div class="sticky top-[49px] z-10 bg-white/95 dark:bg-background-dark/95 backdrop-blur-sm">
<div class="flex border-b border-slate-100 dark:border-primary/10 px-2">
<a id="tab-likes" class="flex flex-1 flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-4 px-1 transition-colors cursor-pointer" href="#">
<p class="text-[11px] font-bold tracking-tight text-center">いいね作品</p>
</a>
<a id="tab-reviews" class="flex flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 px-1 hover:text-primary transition-colors cursor-pointer" href="#">
<p class="text-[11px] font-bold tracking-tight text-center">レビュー</p>
</a>
<a id="tab-actress" class="flex flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 px-1 hover:text-primary transition-colors cursor-pointer" href="#">
<p class="text-[11px] font-bold tracking-tight text-center">いいね女優</p>
</a>
<a id="tab-contrib" class="flex flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4 px-1 hover:text-primary transition-colors cursor-pointer" href="#">
<p class="text-[11px] font-bold tracking-tight text-center">貢献</p>
</a>
</div>
</div>
<!-- いいね作品パネル -->
<div id="panel-likes" class="flex-1 p-3">
<div id="likes-grid" class="grid grid-cols-3 gap-2"></div>
<div id="likes-empty" class="hidden py-16 text-center text-xs text-slate-400">いいねした作品がありません</div>
</div>
<!-- レビューパネル -->
<div id="panel-reviews" class="flex-1 p-4 space-y-3" style="display:none">
<div id="reviews-list"></div>
<div id="reviews-empty" class="hidden py-16 text-center text-xs text-slate-400">まだレビューがありません</div>
</div>
<!-- いいね女優パネル -->
<div id="panel-actress" class="flex-1 p-3" style="display:none">
<div id="actress-grid" class="grid grid-cols-3 gap-3"></div>
<div id="actress-empty" class="hidden py-16 text-center text-xs text-slate-400">いいねした女優がいません</div>
</div>
<!-- 貢献パネル -->
<div id="contrib-panel" class="flex-1 p-4 space-y-4" style="display:none">
<!-- バッジカード -->
<div id="contrib-badge-card" class="rounded-2xl bg-gradient-to-br from-primary/10 to-amber-50 dark:from-primary/20 dark:to-slate-800 border border-primary/20 p-5 flex items-center gap-4">
<div id="contrib-badge-emoji" class="text-4xl w-14 h-14 flex items-center justify-center bg-white dark:bg-slate-900 rounded-2xl shadow-sm">🥉</div>
<div class="flex-1">
<div id="contrib-badge-label" class="text-xs font-bold text-primary mb-1">ブロンズ</div>
<div class="flex items-baseline gap-1">
<span id="contrib-count" class="text-3xl font-black text-slate-900 dark:text-white">0</span>
<span class="text-xs text-slate-500">件の女優特定に貢献</span>
</div>
<div id="contrib-next" class="mt-1.5 text-[10px] text-slate-400"></div>
</div>
</div>
<!-- 次のバッジまでの進捗バー -->
<div id="contrib-progress-wrap" class="space-y-1">
<div class="flex justify-between text-[10px] text-slate-400">
<span id="contrib-progress-label">次のランクまで</span>
<span id="contrib-progress-pct"></span>
</div>
<div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div id="contrib-progress-bar" class="h-full bg-primary rounded-full transition-all" style="width:0%"></div>
</div>
</div>
<!-- バッジ一覧 -->
<div class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mt-2">バッジ一覧</div>
<div class="grid grid-cols-5 gap-2">
<div class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
<span class="text-xl">🥉</span><span class="text-[9px] font-bold text-slate-500">ブロンズ</span><span class="text-[9px] text-slate-400">1件〜</span>
</div>
<div class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
<span class="text-xl">🥈</span><span class="text-[9px] font-bold text-slate-500">シルバー</span><span class="text-[9px] text-slate-400">5件〜</span>
</div>
<div class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
<span class="text-xl">🥇</span><span class="text-[9px] font-bold text-slate-500">ゴールド</span><span class="text-[9px] text-slate-400">20件〜</span>
</div>
<div class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
<span class="text-xl">💎</span><span class="text-[9px] font-bold text-slate-500">プラチナ</span><span class="text-[9px] text-slate-400">50件〜</span>
</div>
<div class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
<span class="text-xl">🏆</span><span class="text-[9px] font-bold text-slate-500">殿堂入り</span><span class="text-[9px] text-slate-400">100件〜</span>
</div>
</div>
<!-- 最近の貢献作品 -->
<div class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mt-2">最近の貢献</div>
<div id="contrib-recent" class="space-y-2"></div>
</div>
<div class="h-24"></div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-20">
<div class="flex gap-2 border-t border-slate-100 dark:border-primary/10 bg-white dark:bg-background-dark px-4 pb-6 pt-2 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">home</span>
</div>
<p class="text-[10px] font-bold">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">search</span>
</div>
<p class="text-[10px] font-bold">Search</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">bar_chart</span>
</div>
<p class="text-[10px] font-bold">Ranking</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">movie</span>
</div>
<p class="text-[10px] font-bold">Video</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px] fill-1">person</span>
</div>
<p class="text-[10px] font-bold">My Page</p>
</a>
</div>
</div>
</div>
<script>
(function(){
  // ─── セッションID ────────────────────────────────────────────
  var SID=(function(){
    var s=localStorage.getItem('_sid');
    if(!s){s=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('_sid',s);}
    return s;
  })();

  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function poster(url){
    if(!url)return '';
    if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');
    return url;
  }

  // ─── タブ切り替え ──────────────────────────────────────────
  var TABS=[
    {id:'tab-likes',   panel:'panel-likes',   load:loadLikes},
    {id:'tab-reviews', panel:'panel-reviews', load:loadReviews},
    {id:'tab-actress', panel:'panel-actress', load:loadActress},
    {id:'tab-contrib', panel:'contrib-panel', load:loadContrib},
  ];
  var currentTab=TABS[0];

  function switchTab(tab){
    if(currentTab===tab)return;
    // アクティブ解除
    TABS.forEach(function(t){
      var btn=document.getElementById(t.id);
      if(!btn)return;
      btn.classList.remove('border-primary','text-primary');
      btn.classList.add('border-transparent','text-slate-500');
      var panel=document.getElementById(t.panel);
      if(panel)panel.style.display='none';
    });
    // アクティブ設定
    var activeBtn=document.getElementById(tab.id);
    if(activeBtn){
      activeBtn.classList.add('border-primary','text-primary');
      activeBtn.classList.remove('border-transparent','text-slate-500');
    }
    var activePanel=document.getElementById(tab.panel);
    if(activePanel)activePanel.style.display='';
    currentTab=tab;
    tab.load();
  }

  TABS.forEach(function(tab){
    var btn=document.getElementById(tab.id);
    if(btn)btn.addEventListener('click',function(e){e.preventDefault();switchTab(tab);});
  });

  // ─── いいね作品 ───────────────────────────────────────────
  var likesLoaded=false;
  function loadLikes(){
    if(likesLoaded)return;
    likesLoaded=true;
    var grid=document.getElementById('likes-grid');
    var empty=document.getElementById('likes-empty');
    if(!grid)return;
    grid.innerHTML='<div class="col-span-3 py-8 text-center text-xs text-slate-400">読み込み中...</div>';
    fetch('/api/mypage/likes?sessionId='+encodeURIComponent(SID))
      .then(function(r){return r.json();})
      .then(function(products){
        if(!products||!products.length){
          grid.innerHTML='';
          if(empty)empty.classList.remove('hidden');
          return;
        }
        grid.innerHTML=products.map(function(p){
          var img=poster(p.main_image_url||'');
          var actress=(p.actresses||'').split(',')[0].trim();
          var pid=encodeURIComponent(p.product_id||'');
          return '<a href="/product/'+pid+'" class="group block">'
            +'<div class="aspect-[3/4] overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-800 relative mb-1.5 shadow-sm">'
            +(img?'<img src="'+esc(img)+'" alt="" class="w-full h-full object-cover object-right block"/>':'')
            +'<div class="absolute bottom-1 right-1">'
            +'<button data-like-pid="'+esc(p.product_id||'')+'" class="bg-white/90 rounded-full p-0.5 shadow-sm text-red-500" onclick="event.preventDefault();event.stopPropagation();toggleLike(this,this.dataset.likePid)">'
            +'<span class="material-symbols-outlined text-[11px]">favorite</span></button>'
            +'</div></div>'
            +'<h3 class="text-[10px] font-bold line-clamp-2 leading-tight mb-0.5">'+esc(p.title||'')+'</h3>'
            +(actress?'<p class="text-[9px] text-slate-400 truncate">'+esc(actress)+'</p>':'')
            +'</a>';
        }).join('');
        if(window.restoreLikes)window.restoreLikes();
      })
      .catch(function(){
        grid.innerHTML='<div class="col-span-3 py-8 text-center text-xs text-slate-400">読み込みエラー</div>';
      });
  }

  // ─── レビュー ──────────────────────────────────────────────
  var reviewsLoaded=false;
  function loadReviews(){
    if(reviewsLoaded)return;
    reviewsLoaded=true;
    var empty=document.getElementById('reviews-empty');
    if(empty)empty.classList.remove('hidden');
  }

  // ─── いいね女優 ───────────────────────────────────────────
  var actressLoaded=false;
  function loadActress(){
    if(actressLoaded)return;
    actressLoaded=true;
    var grid=document.getElementById('actress-grid');
    var empty=document.getElementById('actress-empty');
    if(!grid)return;
    grid.innerHTML='<div class="col-span-3 py-8 text-center text-xs text-slate-400">読み込み中...</div>';
    fetch('/api/mypage/actress-likes?sessionId='+encodeURIComponent(SID))
      .then(function(r){return r.json();})
      .then(function(items){
        if(!items||!items.length){
          grid.innerHTML='';
          if(empty)empty.classList.remove('hidden');
          return;
        }
        grid.innerHTML=items.map(function(a){
          var encName=encodeURIComponent(a.name||'');
          return '<a href="/actress/'+encName+'" class="group flex flex-col items-center gap-1">'
            +'<div class="w-full aspect-square rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 shadow-sm">'
            +(a.image_url?'<img src="'+esc(a.image_url)+'" alt="" class="w-full h-full object-cover object-top block"/>':'<div class="w-full h-full flex items-center justify-center"><span class="material-symbols-outlined text-slate-300 text-3xl">person</span></div>')
            +'</div>'
            +'<p class="text-[10px] font-bold text-center line-clamp-1 w-full">'+esc(a.name||'')+'</p>'
            +'</a>';
        }).join('');
      })
      .catch(function(){
        grid.innerHTML='<div class="col-span-3 py-8 text-center text-xs text-slate-400">読み込みエラー</div>';
      });
  }

  // ─── 貢献 ──────────────────────────────────────────────────
  var contribLoaded=false;
  function loadContrib(){
    if(contribLoaded)return;
    contribLoaded=true;
    var BADGES=[
      {min:100,label:'殿堂入り',emoji:'🏆'},
      {min:50, label:'プラチナ', emoji:'💎'},
      {min:20, label:'ゴールド', emoji:'🥇'},
      {min:5,  label:'シルバー', emoji:'🥈'},
      {min:1,  label:'ブロンズ', emoji:'🥉'},
    ];
    fetch('/api/mypage/contributions',{headers:{'x-session-id':SID}})
      .then(function(r){return r.json();})
      .then(function(d){
        var count=d.count||0;
        var cur=BADGES.find(function(b){return count>=b.min;})||null;
        var emojiEl=document.getElementById('contrib-badge-emoji');
        var labelEl=document.getElementById('contrib-badge-label');
        var countEl=document.getElementById('contrib-count');
        if(emojiEl)emojiEl.textContent=cur?cur.emoji:'—';
        if(labelEl)labelEl.textContent=cur?cur.label:'まだバッジなし';
        if(countEl)countEl.textContent=String(count);
        var nextBadge=null;
        for(var i=BADGES.length-1;i>=0;i--){if(count<BADGES[i].min){nextBadge=BADGES[i];break;}}
        var nextEl=document.getElementById('contrib-next');
        var barEl=document.getElementById('contrib-progress-bar');
        var pctEl=document.getElementById('contrib-progress-pct');
        var lblEl=document.getElementById('contrib-progress-label');
        if(nextBadge){
          var prev=cur?cur.min:0;
          var pct=Math.round((count-prev)/(nextBadge.min-prev)*100);
          if(nextEl)nextEl.textContent=nextBadge.emoji+' '+nextBadge.label+'まであと'+(nextBadge.min-count)+'件';
          if(barEl)barEl.style.width=Math.min(pct,100)+'%';
          if(pctEl)pctEl.textContent=pct+'%';
          if(lblEl)lblEl.textContent=nextBadge.label+'まで';
        }else{
          if(nextEl)nextEl.textContent='🎉 最高ランク達成！';
          if(barEl)barEl.style.width='100%';
          var wrap=document.getElementById('contrib-progress-wrap');
          if(wrap)wrap.style.display='none';
        }
        var recentEl=document.getElementById('contrib-recent');
        if(recentEl&&d.recent&&d.recent.length){
          recentEl.innerHTML=d.recent.map(function(r){
            var dt=new Date(r.created_at);
            var ds=isNaN(dt.getTime())?'':((dt.getMonth()+1)+'/'+dt.getDate());
            return '<a href="/product/'+encodeURIComponent(r.product_id)+'" class="flex items-center gap-3 py-2.5 border-b border-slate-100 dark:border-slate-800 hover:text-primary transition-colors">'
              +'<span class="material-symbols-outlined text-primary text-sm">person_add</span>'
              +'<span class="flex-1 text-xs font-bold uppercase">'+esc(r.product_id)+'</span>'
              +(ds?'<span class="text-[10px] text-slate-400">'+ds+'</span>':'')
              +'</a>';
          }).join('');
        }else if(recentEl){
          recentEl.innerHTML='<p class="text-xs text-slate-400 py-2">まだ貢献がありません。作品ページの「出演者を追加」ボタンで女優を特定しましょう！</p>';
        }
      }).catch(function(){});
  }

  // 初期タブ（いいね作品）を読み込む
  loadLikes();
})();
</script>
</body></html>
