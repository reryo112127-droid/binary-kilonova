<script>
(function(){
  // Tab switching
  var worksSection = document.getElementById('works-section');
  var actressSection = document.getElementById('actress-section');
  document.querySelectorAll('[data-tab]').forEach(function(tab){
    tab.addEventListener('click', function(){
      var t = tab.getAttribute('data-tab');
      document.querySelectorAll('[data-tab]').forEach(function(tt){
        var active = tt === tab;
        tt.classList.toggle('border-primary', active);
        tt.classList.toggle('text-primary', active);
        tt.classList.toggle('border-transparent', !active);
        tt.classList.toggle('text-slate-500', !active);
      });
      worksSection.classList.toggle('hidden', t !== 'works');
      actressSection.classList.toggle('hidden', t !== 'actress');
    });
  });

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function poster(url){if(!url)return '';if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');if(url.includes('/digital/amateur/')&&url.endsWith('jm.jpg'))return url.replace('jm.jpg','jp-001.jpg');return url;}
  function purl(id){return '/product/'+encodeURIComponent(id);}
  function aurl(name){return '/actress/'+encodeURIComponent(name);}

  // Works ranking
  function setWorksCard(n, p){
    var img = document.getElementById('rank-'+n+'-img');
    var ttl = document.getElementById('rank-'+n+'-title');
    var card = document.getElementById('rank-'+n+'-card');
    if (!p) return;
    var ps = poster(p.main_image_url);
    if (img && ps){ img.src = ps; img.alt = p.title||''; img.parentElement.classList.remove('animate-pulse'); }
    if (ttl) ttl.textContent = p.title||'';
    if (card) card.onclick = function(){ location.href = purl(p.product_id); };
  }

  (window.__SSR_RANKING_DATA__
    ? Promise.resolve(window.__SSR_RANKING_DATA__)
    : fetch('/api/ranking?limit=12&excludeBest=1').then(function(r){return r.json();}))
    .then(function(data){
      if (!Array.isArray(data) || !data.length) return;
      setWorksCard(1, data[0]); setWorksCard(2, data[1]); setWorksCard(3, data[2]);
      var grid = document.getElementById('ranking-grid');
      if (grid && data.length > 3){
        grid.innerHTML = data.slice(3).map(function(p, i){
          var rank = i+4;
          var ps = poster(p.main_image_url);
          var img = ps ? '<img class="w-full h-full object-cover object-right block" src="'+esc(ps)+'" alt="'+rank+'"/>' : '';
          return '<a href="'+purl(p.product_id)+'" class="flex flex-col bg-white dark:bg-white/5 p-1.5 rounded-lg border border-primary/5 shadow-sm">'
            +'<div class="relative"><div class="w-full aspect-[3/4] overflow-hidden rounded-md mb-1.5">'+img+'</div>'
            +'<span class="absolute top-0 left-0 bg-black/50 text-white text-[9px] px-1 rounded-br-md font-bold">'+rank+'</span></div>'
            +'<h3 class="font-bold text-[10px] line-clamp-2">'+esc(p.title||'')+'</h3></a>';
        }).join('');
      }
      var el = document.getElementById('ranking-update-date');
      if (el){ var d=new Date(); el.textContent='更新: '+(d.getMonth()+1)+'/'+(d.getDate()); }
    })
    .catch(function(e){ console.error('works ranking error', e); });

  // Actress ranking
  function setCastCard(n, a){
    var img = document.getElementById('cast-rank-'+n+'-img');
    var ttl = document.getElementById('cast-rank-'+n+'-title');
    var card = document.getElementById('cast-rank-'+n+'-card');
    if (!a) return;
    if (img && a.image_url){ img.src = a.image_url; img.alt = a.name||''; img.parentElement.classList.remove('animate-pulse'); }
    if (ttl) ttl.textContent = a.name||'';
    if (card) card.onclick = function(){ location.href = aurl(a.name); };
  }

  (window.__SSR_ACTRESS_RANKING_DATA__
    ? Promise.resolve(window.__SSR_ACTRESS_RANKING_DATA__)
    : fetch('/api/ranking/actress?limit=12').then(function(r){return r.json();}))
    .then(function(data){
      if (!Array.isArray(data) || !data.length) return;
      setCastCard(1, data[0]); setCastCard(2, data[1]); setCastCard(3, data[2]);
      var list = document.getElementById('actress-list');
      if (list && data.length > 3){
        list.innerHTML = data.slice(3).map(function(a, i){
          var rank = i+4;
          var img = a.image_url ? '<img class="w-full h-full object-cover object-top block" src="'+esc(a.image_url)+'" alt="'+rank+'"/>' : '';
          return '<a href="'+aurl(a.name)+'" class="flex flex-col items-center bg-white p-2 rounded-lg border border-primary/5 shadow-sm">'
            +'<div class="relative w-full flex justify-center mb-1.5">'
            +'<div class="w-16 h-16 rounded-full overflow-hidden bg-gray-100">'+img+'</div>'
            +'<span class="absolute top-0 left-0 bg-black/50 text-white text-[9px] px-1 rounded-br-md font-bold">'+rank+'</span>'
            +'</div>'
            +'<p class="text-[10px] font-bold text-center line-clamp-1 w-full">'+esc(a.name||'')+'</p></a>';
        }).join('');
      }
    })
    .catch(function(e){ console.error('actress ranking error', e); });
})();
</script>
