<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#ffffff",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Noto Sans JP", "Public Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="sticky top-0 z-50 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-3 border-b border-slate-100 dark:border-slate-800">
<div class="flex w-10 items-center justify-start">
<button id="btn-back" class="flex items-center justify-center p-1 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
</div> <!-- Spacer for centering -->
<h1 class="flex-1 text-center text-lg font-bold leading-tight tracking-tight">作品一覧</h1>
<div class="flex w-10 items-center justify-end">
<button id="btn-search-hdr" class="flex items-center justify-center p-1 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</header>
<main class="flex-1">
<div class="flex flex-col gap-3 py-3">
<!-- 1. 最上部: 予約作品/新作 セグメントコントロール -->
<div class="px-4">
<div class="flex h-11 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-lg px-2 text-sm font-bold transition-all has-[:checked]:bg-white has-[:checked]:text-primary dark:has-[:checked]:bg-slate-700 shadow-sm has-[:checked]:shadow-none">
<span>新作</span>
<input checked="" class="hidden" name="content-type" type="radio" value="new-releases"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-lg px-2 text-sm font-bold text-slate-500 transition-all has-[:checked]:bg-white has-[:checked]:text-primary dark:has-[:checked]:bg-slate-700 shadow-sm has-[:checked]:shadow-none">
<span>予約作品</span>
<input class="hidden" name="content-type" type="radio" value="pre-order"/>
</label>
</div>
</div>
<!-- 2. その下: フィルタとトグルボタン -->
<div class="flex items-center gap-2 overflow-x-auto px-4 no-scrollbar">
<button class="flex h-9 shrink-0 items-center justify-center gap-1 rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-1">
<span class="material-symbols-outlined text-[18px]">filter_list</span>
<span class="material-symbols-outlined text-[16px]">expand_more</span>
</button>
<div class="h-6 w-px bg-slate-200 dark:bg-slate-700 shrink-0"></div>
<button id="btn-best" class="flex h-9 shrink-0 items-center justify-center gap-1 rounded-full border border-slate-200 dark:border-slate-700 px-3 py-1">
<span class="text-xs font-medium">BEST/総集編</span>
<span class="material-symbols-outlined text-[18px] text-primary">toggle_on</span>
</button>
<button id="btn-vr" class="flex h-9 shrink-0 items-center justify-center gap-1 rounded-full border border-slate-200 dark:border-slate-700 px-3 py-1">
<span class="text-xs font-medium">VR作品</span>
<span class="material-symbols-outlined text-[18px] text-slate-400">toggle_off</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 px-3">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
</button>
<div class="h-6 w-px bg-slate-200 dark:bg-slate-700 shrink-0"></div>
<button id="btn-fanza" class="flex h-9 shrink-0 items-center justify-center rounded-full border border-slate-200 dark:border-slate-700 px-3 py-1">
<span class="text-xs font-medium">FANZA</span>
</button>
<button id="btn-mgs" class="flex h-9 shrink-0 items-center justify-center rounded-full border border-slate-200 dark:border-slate-700 px-3 py-1">
<span class="text-xs font-medium">MGS動画</span>
</button>
</div>
<!-- 3. その下: 新着/人気順と昇順/降順 -->
<div class="flex items-center gap-2 px-4">
<div class="flex h-9 flex-1 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-md px-2 text-xs font-bold transition-all has-[:checked]:bg-white has-[:checked]:text-primary dark:has-[:checked]:bg-slate-700 shadow-sm has-[:checked]:shadow-none">
<span class="truncate">新着順</span>
<input checked="" class="hidden" name="sort-order" type="radio" value="new"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-md px-2 text-xs font-bold text-slate-500 transition-all has-[:checked]:bg-white has-[:checked]:text-primary dark:has-[:checked]:bg-slate-700 shadow-sm has-[:checked]:shadow-none">
<span class="truncate">人気順</span>
<input class="hidden" name="sort-order" type="radio" value="popular"/>
</label>
</div>
<button class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800">
<span class="material-symbols-outlined text-[20px]">south</span>
</button>
</div>
</div>
<!-- 5. 下部の作品グリッド (3列維持) -->
<div id="products-grid" class="grid grid-cols-3 gap-x-2 gap-y-4 px-4 pb-24">
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 z-50 flex border-t border-slate-100 dark:border-slate-800 bg-white/95 dark:bg-background-dark/95 backdrop-blur-md px-2 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">ホーム</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="text-[10px] font-medium">検索</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-medium">ランキング</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">play_circle</span>
<span class="text-[10px] font-medium">動画</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">マイページ</span>
</a>
</nav>
</div>
</body></html>
