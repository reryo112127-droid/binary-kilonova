<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>登録完了</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-4 border-b border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors" style="">
<span class="material-symbols-outlined" style="">arrow_back</span>
</button>
<h1 class="text-lg font-bold" style="">完了</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-10 text-center pb-20">
<!-- Success Icon Container -->
<div class="mb-8 flex items-center justify-center w-24 h-24 rounded-full bg-emerald-100 dark:bg-emerald-900/30">
<span class="material-symbols-outlined text-emerald-500 dark:text-emerald-400 !text-6xl" style="">check_circle</span>
</div>
<h2 class="text-2xl font-bold mb-4" style="">登録完了</h2>
<p class="text-slate-600 dark:text-slate-400 leading-relaxed mb-10 max-w-xs" style="">
            SNSアカウント情報の登録が完了しました。ご協力ありがとうございました。
        </p>
<!-- Action Buttons -->
<div class="w-full space-y-3 max-w-sm">
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity" style="">
                作品ページに戻る
            </button>
<button class="w-full py-4 bg-primary/10 dark:bg-primary/20 text-primary font-bold rounded-xl hover:bg-primary/20 dark:hover:bg-primary/30 transition-colors" style="">
                ホーム画面に戻る</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bottom-0 w-full border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark px-2 pb-6 pt-2 fixed z-50">
<div class="flex justify-around items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#" style="">
<span class="material-symbols-outlined" style="">home</span>
<span class="text-[10px] font-medium" style="">ホーム</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#" style="">
<span class="material-symbols-outlined" style="">search</span>
<span class="text-[10px] font-medium" style="">検索</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#" style="">
<span class="material-symbols-outlined" style="">leaderboard</span>
<span class="text-[10px] font-medium" style="">ランキング</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#" style="">
<span class="material-symbols-outlined" style="">play_circle</span>
<span class="text-[10px] font-medium" style="">動画</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#" style="">
<span class="material-symbols-outlined fill-1" style="">person</span>
<span class="text-[10px] font-medium" style="">マイページ</span>
</a>
</div>
</nav>
</body></html>
