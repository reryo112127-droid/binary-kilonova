<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>映画データベース - 検索結果</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-typography">
    body {
      font-family: 'Noto Sans JP', 'Public Sans', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .text-xxs {
      font-size: 0.65rem;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
<script id="tailwind-config">
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    "primary": "#ec5b13",
                }
            }
        }
    }
</script>
</head>
<body class="bg-white text-gray-900">
<!-- BEGIN: Header -->
<header class="sticky top-0 z-50 bg-white border-b border-gray-100 py-3 px-4">
<div class="flex justify-center items-center">
<h1 class="text-lg font-bold tracking-tight">メーカー名 / ジャンル名</h1>
</div>
</header>
<!-- END: Header -->
<main class="pb-[80px]">
<div id="actress-profiles-wrap"></div>
<!-- BEGIN: FilterAndActionArea -->
<section class="flex flex-col gap-2 py-4" data-purpose="filter-controls">
<!-- 1. Top row: Type switching (3-way toggle) -->
<div class="px-4">
<div class="flex h-10 items-center justify-center rounded-lg bg-gray-100 p-1">
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-md px-1 text-sm font-bold transition-all has-[:checked]:bg-white has-[:checked]:text-primary shadow-sm has-[:checked]:shadow-none">
<span>すべて</span>
<input checked="" class="hidden" name="content-type" type="radio" value="all"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-md px-1 text-sm font-bold text-gray-400 transition-all has-[:checked]:bg-white has-[:checked]:text-primary shadow-sm has-[:checked]:shadow-none">
<span>予約作品</span>
<input class="hidden" name="content-type" type="radio" value="pre-order"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-md px-1 text-sm font-bold text-gray-400 transition-all has-[:checked]:bg-white has-[:checked]:text-primary shadow-sm has-[:checked]:shadow-none">
<span>新作</span>
<input class="hidden" name="content-type" type="radio" value="new-releases"/>
</label>
</div>
</div>
<!-- 2. Middle row: Filter toggles -->
<div class="flex items-center gap-2 overflow-x-auto px-4 no-scrollbar">
<button class="flex h-8 shrink-0 items-center justify-center gap-1 rounded-full bg-gray-100 px-3 py-1">
<span class="material-symbols-outlined text-[16px]">filter_list</span>
<span class="material-symbols-outlined text-[16px]">expand_more</span>
</button>
<div class="h-4 w-px bg-gray-200 shrink-0"></div>
<button id="sf-best-btn" class="flex h-8 shrink-0 items-center justify-center gap-1 rounded-full border border-gray-200 px-3 py-1">
<span class="text-[11px] font-medium text-gray-600">BEST/総集編</span>
<span id="sf-best-icon" class="material-symbols-outlined text-[18px] text-primary">toggle_on</span>
</button>
<button id="sf-vr-btn" class="flex h-8 shrink-0 items-center justify-center gap-1 rounded-full border border-gray-200 px-3 py-1">
<span class="text-[11px] font-medium text-gray-600">VR作品</span>
<span id="sf-vr-icon" class="material-symbols-outlined text-[18px] text-gray-300">toggle_off</span>
</button>
<button id="sf-cal-btn" class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-gray-100">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
</button>
<div class="h-4 w-px bg-gray-200 shrink-0"></div>
<button id="sf-mgs-btn" class="flex h-8 shrink-0 items-center justify-center gap-1 rounded-full border border-gray-200 px-3 py-1">
  <span class="text-[11px] font-medium text-gray-600">MGS</span>
</button>
<button id="sf-fanza-btn" class="flex h-8 shrink-0 items-center justify-center gap-1 rounded-full border border-gray-200 px-3 py-1">
  <span class="text-[11px] font-medium text-gray-600">FANZA</span>
</button>
</div>
<div id="sf-cal-panel" class="hidden px-4 pb-1 flex gap-2 items-center">
  <input type="date" id="sf-from" class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 flex-1 outline-none"/>
  <span class="text-xs text-gray-400">〜</span>
  <input type="date" id="sf-to" class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 flex-1 outline-none"/>
  <button id="sf-cal-clear" class="text-[11px] text-gray-400 hover:text-primary shrink-0">クリア</button>
</div>
<!-- 3. Bottom row: Sort order -->
<div class="flex items-center gap-2 px-4">
<div class="flex h-9 flex-1 items-center justify-center rounded-md bg-gray-100 p-0.5">
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-sm px-1 text-[11px] font-bold transition-all has-[:checked]:bg-white has-[:checked]:text-primary shadow-sm has-[:checked]:shadow-none">
<span class="truncate">新着順</span>
<input checked="" class="hidden" name="sort-order" type="radio" value="new"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center rounded-sm px-1 text-[11px] font-bold text-gray-400 transition-all has-[:checked]:bg-white has-[:checked]:text-primary shadow-sm has-[:checked]:shadow-none">
<span class="truncate">人気順</span>
<input class="hidden" name="sort-order" type="radio" value="popular"/>
</label>
</div>
<button class="flex h-9 w-9 shrink-0 items-center justify-center rounded-md bg-gray-100">
<span class="material-symbols-outlined text-[18px]">south</span>
</button>
</div>
</section>
<!-- END: FilterAndActionArea -->
<!-- BEGIN: ResultsGrid -->
<section class="px-4">
<div id="search-results-grid" class="grid grid-cols-3 gap-x-2 gap-y-4">
</div>
</section>
<!-- END: ResultsGrid -->
<div class="px-4 py-6 flex justify-center">
<button id="load-more-btn" onclick="fetchMore()" style="display:none" class="w-full max-w-xs py-3 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 hover:border-primary hover:text-primary transition-colors shadow-sm">
もっと見る
</button>
</div>
</main>
<script>
(function(){
  var ps = new URLSearchParams(location.search);
  var actress=ps.get('actress')||'', maker=ps.get('maker')||'', label=ps.get('label')||'', genre=ps.get('genre')||'', q=ps.get('q')||'';
  var term = actress||maker||label||genre||q;

  var h1 = document.querySelector('header h1');
  if (h1 && term) h1.textContent = term;

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function poster(url){if(!url)return'';if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');if(url.endsWith('pl.jpg'))return url.replace('pl.jpg','pt.jpg');return url;}

  var filters = { contentType:'all', sortOrder:'new', source:'', showBest:true, vrOnly:false, fromDate:'', toDate:'' };
  var LIMIT = 60;
  var fetchOffset = 0;
  var isLoading = false;

  function buildUrl(off){
    var p = new URLSearchParams();
    p.set('limit', String(LIMIT + 1)); // +1 でhasMore判定
    p.set('offset', String(off || 0));
    if (filters.vrOnly) p.set('excludeGenres','VR');
    else if (actress) p.set('actress',actress);
    else if (maker) p.set('maker',maker);
    else if (label) p.set('label',label);
    else if (genre) p.set('genre',genre);
    else if (q) p.set('q',q);

    if (filters.contentType==='pre-order') p.set('sort','pre-order');
    else if (filters.contentType==='new') p.set('sort','new');
    else p.set('sort', filters.sortOrder==='popular' ? 'wish_count' : 'new');

    if (filters.source) p.set('source',filters.source);
    if (!filters.showBest) p.set('excludeBest','1');
    if (filters.fromDate) p.set('fromDate',filters.fromDate);
    if (filters.toDate) p.set('toDate',filters.toDate);
    return '/api/products?'+p.toString();
  }

  function cardHtml(p){
    var img = poster(p.main_image_url);
    var noAct = !(p.actresses&&p.actresses.trim());
    return '<a href="/product/'+encodeURIComponent(p.product_id)+'" class="flex flex-col gap-1 block">'
      +'<div class="relative w-full overflow-hidden rounded-md bg-gray-100">'
      +(img?'<img class="w-full h-auto block" src="'+esc(img)+'" alt="" loading="lazy"/>':'')
      +'<div class="absolute bottom-1 right-1 flex gap-1">'
      +(noAct?'<button class="h-5 w-5 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-sm text-white" onclick="event.preventDefault();event.stopPropagation()"><span class="material-symbols-outlined text-[12px]">add</span></button>':'')
      +'<button class="h-5 w-5 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-sm text-white" onclick="event.preventDefault();event.stopPropagation()"><span class="material-symbols-outlined text-[12px]">favorite</span></button>'
      +'</div></div>'
      +'<p class="line-clamp-2 text-[10px] font-bold leading-tight">'+esc(p.title||'')+'</p>'
      +(p.actresses?'<p class="text-[9px] text-primary truncate">'+esc(p.actresses.split(',')[0].trim())+'</p>':'')
      +'</a>';
  }

  function setLoadMoreBtn(visible){
    var btn = document.getElementById('load-more-btn');
    if (btn) btn.style.display = visible ? '' : 'none';
  }

  var grid = document.getElementById('search-results-grid');
  function fetchAndRender(){
    if (!grid) return;
    fetchOffset = 0;
    grid.innerHTML = '<div class="col-span-3 py-8 text-center text-xs text-gray-400">読み込み中...</div>';
    setLoadMoreBtn(false);
    fetch(buildUrl(0)).then(function(r){return r.json();}).then(function(data){
      if (!data||!data.length){ grid.innerHTML='<div class="col-span-3 py-8 text-center text-xs text-gray-400">作品が見つかりませんでした</div>'; return; }
      var hasMore = data.length > LIMIT;
      var items = hasMore ? data.slice(0, LIMIT) : data;
      grid.innerHTML = items.map(cardHtml).join('');
      setLoadMoreBtn(hasMore);
    }).catch(function(){ grid.innerHTML='<div class="col-span-3 py-8 text-center text-xs text-gray-400">エラーが発生しました</div>'; });
  }

  window.fetchMore = function(){
    if (isLoading || !grid) return;
    isLoading = true;
    var btn = document.getElementById('load-more-btn');
    if (btn) btn.textContent = '読み込み中...';
    fetchOffset += LIMIT;
    fetch(buildUrl(fetchOffset)).then(function(r){return r.json();}).then(function(data){
      isLoading = false;
      var hasMore = data && data.length > LIMIT;
      var items = (data && hasMore) ? data.slice(0, LIMIT) : (data || []);
      items.forEach(function(p){ grid.insertAdjacentHTML('beforeend', cardHtml(p)); });
      if (btn) btn.textContent = 'もっと見る';
      setLoadMoreBtn(hasMore);
    }).catch(function(){ isLoading = false; if (btn) btn.textContent = 'もっと見る'; });
  };

  // Content type radios
  document.querySelectorAll('input[name="content-type"]').forEach(function(r){
    r.addEventListener('change',function(){ filters.contentType=r.value==='all'?'all':r.value==='pre-order'?'pre-order':'new'; fetchAndRender(); });
  });
  // Sort order radios
  document.querySelectorAll('input[name="sort-order"]').forEach(function(r){
    r.addEventListener('change',function(){ filters.sortOrder=r.value==='popular'?'popular':'new'; fetchAndRender(); });
  });
  // BEST toggle
  var bestBtn=document.getElementById('sf-best-btn'), bestIcon=document.getElementById('sf-best-icon');
  if(bestBtn) bestBtn.addEventListener('click',function(){
    filters.showBest=!filters.showBest;
    if(bestIcon){ bestIcon.textContent=filters.showBest?'toggle_on':'toggle_off'; bestIcon.className='material-symbols-outlined text-[18px] '+(filters.showBest?'text-primary':'text-gray-300'); }
    fetchAndRender();
  });
  // VR toggle
  var vrBtn=document.getElementById('sf-vr-btn'), vrIcon=document.getElementById('sf-vr-icon');
  if(vrBtn) vrBtn.addEventListener('click',function(){
    filters.vrOnly=!filters.vrOnly;
    if(vrIcon){ vrIcon.textContent=filters.vrOnly?'toggle_on':'toggle_off'; vrIcon.className='material-symbols-outlined text-[18px] '+(filters.vrOnly?'text-primary':'text-gray-300'); }
    fetchAndRender();
  });
  // Calendar
  var calBtn=document.getElementById('sf-cal-btn'), calPanel=document.getElementById('sf-cal-panel');
  if(calBtn&&calPanel) calBtn.addEventListener('click',function(){ calPanel.classList.toggle('hidden'); });
  var fromInput=document.getElementById('sf-from'), toInput=document.getElementById('sf-to');
  if(fromInput) fromInput.addEventListener('change',function(){ filters.fromDate=fromInput.value; fetchAndRender(); });
  if(toInput) toInput.addEventListener('change',function(){ filters.toDate=toInput.value; fetchAndRender(); });
  var calClear=document.getElementById('sf-cal-clear');
  if(calClear) calClear.addEventListener('click',function(){ filters.fromDate=''; filters.toDate=''; if(fromInput)fromInput.value=''; if(toInput)toInput.value=''; fetchAndRender(); });
  // MGS/FANZA source
  var mgsBtn=document.getElementById('sf-mgs-btn'), fanzaBtn=document.getElementById('sf-fanza-btn');
  function updateSourceBtns(){
    if(mgsBtn){ mgsBtn.className=mgsBtn.className.replace(/bg-primary text-white|bg-gray-100/g,'').trim(); mgsBtn.classList.add(filters.source==='mgs'?'bg-primary':'bg-gray-100'); var s=mgsBtn.querySelector('span'); if(s) s.className='text-[11px] font-medium '+(filters.source==='mgs'?'text-white':'text-gray-600'); }
    if(fanzaBtn){ fanzaBtn.className=fanzaBtn.className.replace(/bg-primary text-white|bg-gray-100/g,'').trim(); fanzaBtn.classList.add(filters.source==='fanza'?'bg-primary':'bg-gray-100'); var s=fanzaBtn.querySelector('span'); if(s) s.className='text-[11px] font-medium '+(filters.source==='fanza'?'text-white':'text-gray-600'); }
  }
  if(mgsBtn) mgsBtn.addEventListener('click',function(){ filters.source=filters.source==='mgs'?'':'mgs'; updateSourceBtns(); fetchAndRender(); });
  if(fanzaBtn) fanzaBtn.addEventListener('click',function(){ filters.source=filters.source==='fanza'?'':'fanza'; updateSourceBtns(); fetchAndRender(); });

  // Actress profile cards
  var profilesWrap = document.getElementById('actress-profiles-wrap');
  if (actress && profilesWrap) {
    var actressNames = actress.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    function calcAge(b){if(!b)return null;var d=new Date(b),t=new Date(),a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a;}
    function fmtBday(b){if(!b)return'';var pts=b.split('-');return pts[0]+'年'+parseInt(pts[1])+'月'+parseInt(pts[2])+'日';}
    actressNames.forEach(function(actName){
      fetch('/api/actress/'+encodeURIComponent(actName)).then(function(r){return r.json();}).then(function(p){
        var infoParts=[];
        if(p.birthday){var age=calcAge(p.birthday);infoParts.push((age?age+'歳 ':'')+'('+fmtBday(p.birthday)+')');}
        var sz=[];
        if(p.height)sz.push('T'+p.height);
        if(p.bust)sz.push('B'+p.bust+(p.cup?'('+p.cup+'カップ)':''));
        if(p.waist)sz.push('W'+p.waist);
        if(p.hip)sz.push('H'+p.hip);
        if(sz.length)infoParts.push(sz.join(' '));
        if(p.blood_type)infoParts.push(p.blood_type+'型');
        if(p.prefectures)infoParts.push(p.prefectures);
        var infoHtml=infoParts.map(function(s){return'<span>'+esc(s)+'</span>';}).join('');
        var snsHtml='';
        if(p.twitter)snsHtml+='<a href="https://x.com/'+esc(p.twitter)+'" target="_blank" rel="noopener" class="flex items-center gap-1 px-1.5 py-0.5 bg-slate-900 text-white rounded text-[9px] font-bold">X</a>';
        if(p.instagram)snsHtml+='<a href="https://www.instagram.com/'+esc(p.instagram)+'" target="_blank" rel="noopener" class="flex items-center gap-1 px-1.5 py-0.5 bg-gradient-to-r from-purple-500 to-orange-500 text-white rounded text-[9px] font-bold">IG</a>';
        if(p.tiktok)snsHtml+='<a href="https://www.tiktok.com/@'+esc(p.tiktok)+'" target="_blank" rel="noopener" class="flex items-center gap-1 px-1.5 py-0.5 bg-black text-white rounded text-[9px] font-bold">TikTok</a>';
        var extraHtml='';
        if(p.augmented)extraHtml+='<span class="px-1.5 py-0.5 bg-pink-100 text-pink-600 text-[8px] font-bold rounded-full border border-pink-200">豊胸</span>';
        if(p.aliases&&p.aliases.length)extraHtml+='<span class="text-[9px] text-slate-400">旧名：'+p.aliases.map(function(a){return esc(a);}).join('・')+'</span>';
        var displayName=esc(p.name||actName);
        var imgSrc=p.image_url?esc(p.image_url):'';
        var wrap=document.createElement('div');
        wrap.innerHTML='<section class="bg-white px-4 py-3 border-b border-slate-100">'
          +'<div class="flex items-center gap-3">'
          +'<div class="flex-shrink-0"><div class="w-14 h-14 rounded-full overflow-hidden border-2 border-primary/10 shadow-sm bg-slate-100">'
          +(imgSrc?'<img class="w-full h-full object-cover" src="'+imgSrc+'" alt="'+displayName+'" loading="lazy"/>':'')
          +'</div></div>'
          +'<div class="flex-1">'
          +'<a href="/actress/'+encodeURIComponent(p.name||actName)+'" class="text-base font-bold hover:underline block" style="color:inherit">'+displayName+'</a>'
          +(infoHtml?'<div class="text-[10px] text-slate-500 flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-0.5">'+infoHtml+'</div>':'')
          +(snsHtml?'<div class="flex flex-wrap gap-1.5 mt-1.5">'+snsHtml+'</div>':'')
          +(extraHtml?'<div class="flex flex-wrap gap-1 mt-1">'+extraHtml+'</div>':'')
          +'</div></div></section>';
        profilesWrap.appendChild(wrap.firstChild);
      }).catch(function(){});
    });
  }

  if (term) fetchAndRender();
})();
</script>
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 pb-6 pt-2 flex items-center justify-around z-50">
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-gray-400">home</span>
<span class="text-[10px] text-gray-400">ホーム</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="text-[10px] font-bold text-primary">検索</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-gray-400">bar_chart</span>
<span class="text-[10px] text-gray-400">ランキング</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-gray-400">play_circle</span>
<span class="text-[10px] text-gray-400">動画</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-gray-400">person</span>
<span class="text-[10px] text-gray-400">マイページ</span>
</a>
</nav>
<!-- END: BottomNavigation -->
</body></html>
