<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>報告完了</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-slate-200 dark:border-slate-800">
<div class="flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100" style="">arrow_back</span>
</div>
<h2 class="text-lg font-bold leading-tight flex-1 text-center pr-10" style="">完了</h2>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12 text-center pb-24">
<!-- Success Icon -->
<div class="mb-8 flex items-center justify-center bg-green-100 dark:bg-green-900/30 rounded-full p-6 text-green-600 dark:text-green-400">
<span class="material-symbols-outlined !text-7xl" style='font-variation-settings: "FILL" 1;'>check_circle</span>
</div>
<!-- Completion Text -->
<h1 class="text-2xl font-bold leading-tight mb-4 text-slate-900 dark:text-slate-100" style="">
            改名情報の報告が完了しました。
        </h1>
<p class="text-base font-normal leading-relaxed text-slate-600 dark:text-slate-400 mb-12" style="">
            審査後、情報が反映されます。
        </p>
<!-- Action Buttons -->
<div class="w-full max-w-xs space-y-4">
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity" style="">
                作品ページに戻る
            </button>
<button class="w-full py-4 bg-primary/10 dark:bg-primary/20 text-primary font-bold rounded-xl hover:bg-primary/20 transition-colors" style="">ホーム画面に戻る</button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark px-2 pb-6 pt-2">
<div class="flex items-center justify-around">
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">home</span>
<p class="text-[10px] font-medium leading-normal" style="">Home</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">search</span>
<p class="text-[10px] font-medium leading-normal" style="">Search</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">leaderboard</span>
<p class="text-[10px] font-medium leading-normal" style="">Ranking</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">play_circle</span>
<p class="text-[10px] font-medium leading-normal" style="">Video</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#" style="">
<span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>person</span>
<p class="text-[10px] font-medium leading-normal" style="">My Page</p>
</a>
</div>
</nav>
</body></html>
