<script>(function(){
var g=document.getElementById('products-grid'),pgWrap=document.getElementById('pagination-wrap');
if(!g)return;
var FETCH_LIMIT=200,today=new Date();
var state={period:'all',selectedDate:null,calYear:today.getFullYear(),calMonth:today.getMonth(),source:'',excludeBest:false,excludeVR:false,maker:'',actress:'',genre:''};
var fetchOffset=0,isLoading=false;

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getRange(){
  var t=fmt(today);
  if(state.selectedDate)return{fromDate:state.selectedDate,toDate:state.selectedDate};
  if(state.period==='week'){var d=new Date(today);d.setDate(today.getDate()+7);return{fromDate:t,toDate:fmt(d)};}
  if(state.period==='month'){var end=new Date(today.getFullYear(),today.getMonth()+1,0);return{fromDate:t,toDate:fmt(end)};}
  if(state.period==='next-month'){var nm=today.getMonth()+1,ny=today.getFullYear();if(nm>11){nm=0;ny++;}var s=new Date(ny,nm,1),e=new Date(ny,nm+1,0);return{fromDate:fmt(s),toDate:fmt(e)};}
  return{fromDate:'',toDate:''};
}
function renderCal(){
  var y=state.calYear,m=state.calMonth,first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),prevLast=new Date(y,m,0).getDate(),todayStr=fmt(today),html='';
  document.getElementById('cal-label').textContent=y+'年 '+(m+1)+'月';
  for(var i=0;i<first;i++)html+='<div class="py-1 text-gray-300">'+(prevLast-first+1+i)+'</div>';
  for(var d=1;d<=last;d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isPast=ds<todayStr,isSel=ds===state.selectedDate,isToday=ds===todayStr;
    var cls='py-1 rounded transition ';
    if(isPast)cls+='text-gray-300 cursor-default';
    else if(isSel)cls+='bg-blue-600 text-white font-bold cursor-pointer';
    else if(isToday)cls+='bg-blue-100 text-blue-700 font-bold cursor-pointer';
    else cls+='hover:bg-blue-50 text-gray-700 cursor-pointer';
    var oc=isPast?'':' onclick="selectDate(\''+ds+'\')"';
    html+='<button class="'+cls+'"'+oc+'>'+d+'</button>';
  }
  var rem=(7-((first+last)%7))%7;for(var n=1;n<=rem;n++)html+='<div class="py-1 text-gray-300">'+n+'</div>';
  document.getElementById('cal-days').innerHTML=html;
}
function updateQfBtns(a){
  ['all','week','month','next-month'].forEach(function(p){var id='qf-'+(p==='next-month'?'next':p);var b=document.getElementById(id);if(!b)return;b.className=p===a?'px-2.5 py-1.5 text-[11px] font-bold bg-blue-600 text-white rounded-md transition':'px-2.5 py-1.5 text-[11px] bg-gray-50 hover:bg-blue-50 hover:text-blue-600 text-gray-600 rounded-md transition border border-transparent hover:border-blue-100';});
}
function updateSrcBtns(){
  var map={'':'src-all','mgs':'src-mgs','fanza':'src-fanza'};
  Object.keys(map).forEach(function(s){var b=document.getElementById(map[s]);if(!b)return;b.className='flex-1 text-[11px] py-1.5 rounded-md '+(s===state.source?'font-bold bg-white shadow-sm text-blue-600':'font-medium text-gray-500 hover:text-gray-700');});
}
function updateFilterBtns(){
  var act='inline-flex items-center text-[11px] font-bold px-2.5 py-1.5 rounded-lg border transition bg-blue-50 border-blue-200 text-blue-700';
  var ina='inline-flex items-center text-[11px] px-2.5 py-1.5 rounded-lg border transition bg-gray-50 border-gray-200 text-gray-600 hover:border-blue-200 hover:text-blue-600';
  var b=document.getElementById('qf-best');if(b)b.className=(state.excludeBest?act:ina);
  var v=document.getElementById('qf-vr');if(v)v.className=(state.excludeVR?act:ina);
}
function setLoadMoreVisible(v){
  if(!pgWrap)return;
  if(v){pgWrap.innerHTML='<button onclick="loadMore()" class="px-8 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 shadow-sm transition">さらに読み込む</button>';pgWrap.style.display='flex';pgWrap.style.justifyContent='center';}
  else{pgWrap.innerHTML='';pgWrap.style.display='none';}
}
function buildUrl(off){
  var r=getRange();
  var url='/api/products?sort=pre-order&limit='+(FETCH_LIMIT+1)+'&offset='+off;
  if(r.fromDate)url+='&fromDate='+r.fromDate;
  if(r.toDate)url+='&toDate='+r.toDate;
  if(state.source)url+='&source='+state.source;
  if(state.excludeBest)url+='&excludeBest=1';
  if(state.excludeVR)url+='&excludeGenres=VR';
  if(state.maker)url+='&maker='+encodeURIComponent(state.maker);
  if(state.actress)url+='&actress='+encodeURIComponent(state.actress);
  if(state.genre)url+='&genre='+encodeURIComponent(state.genre);
  return url;
}
function cardHtml(p){
  var img=p.main_image_url||'';
  var t=((p.title||'').substring(0,40)).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  var dt=(p.sale_start_date||'').substring(0,10).replace(/-/g,'/');
  var pid=encodeURIComponent(p.product_id||'');
  var badge=p.source==='fanza'?'<span class="absolute top-2 right-2 bg-orange-500 text-white text-[8px] font-bold px-1 py-0.5 rounded">FANZA</span>':'<span class="absolute top-2 right-2 bg-teal-600 text-white text-[8px] font-bold px-1 py-0.5 rounded">MGS</span>';
  return '<article class="bg-white border border-gray-100 rounded-xl overflow-hidden flex flex-col hover:shadow-xl transition duration-300 group cursor-pointer" onclick="location.href=\'/product/'+pid+'\'">'
    +'<div class="bg-gray-50 relative overflow-hidden aspect-[3/4]">'
    +(img?'<img alt="" class="w-full h-full object-cover object-right group-hover:scale-105 transition duration-500" src="'+img+'"/>':'')
    +'<span class="absolute top-2 left-2 bg-blue-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded">予約受付中</span>'
    +badge+'</div>'
    +'<div class="p-3"><h3 class="text-[12px] font-bold line-clamp-2 mb-1 leading-tight h-8">'+t+'</h3>'
    +'<p class="text-[10px] text-gray-400">'+dt+' 発売予定</p></div></article>';
}
function loadProducts(){
  fetchOffset=0;
  if(window.__SSR_PREORDER_DATA__&&window.__SSR_PREORDER_DATA__.length&&state.period==='all'&&!state.source&&!state.excludeBest&&!state.excludeVR&&!state.maker&&!state.actress&&!state.genre){
    var _pd=window.__SSR_PREORDER_DATA__;window.__SSR_PREORDER_DATA__=null;
    var _hm=_pd.length>FETCH_LIMIT;if(_hm)_pd=_pd.slice(0,FETCH_LIMIT);
    var cEl=document.getElementById('result-count');if(cEl)cEl.textContent=(_pd.length||0)+(_hm?'+':'')+' 件';
    g.innerHTML=_pd.length?_pd.map(cardHtml).join(''):'<p class="col-span-5 text-center text-gray-400 py-12 text-sm">この期間の予約作品がありません</p>';
    if(_pd.length){fetchOffset=FETCH_LIMIT;setLoadMoreVisible(_hm);}
    return;
  }
  g.innerHTML='<p class="col-span-5 text-center text-gray-400 py-12 text-sm">読み込み中...</p>';
  setLoadMoreVisible(false);
  fetch(buildUrl(0)).then(function(res){return res.json();}).then(function(d){
    var hasMore=d&&d.length>FETCH_LIMIT;if(hasMore)d=d.slice(0,FETCH_LIMIT);
    var cEl=document.getElementById('result-count');if(cEl)cEl.textContent=(d?d.length:0)+(hasMore?'+':'')+' 件';
    if(!d||!d.length){g.innerHTML='<p class="col-span-5 text-center text-gray-400 py-12 text-sm">この期間の予約作品がありません</p>';return;}
    g.innerHTML=d.map(cardHtml).join('');
    fetchOffset=FETCH_LIMIT;
    setLoadMoreVisible(hasMore);
  }).catch(function(){g.innerHTML='<p class="col-span-5 text-center text-gray-400 py-12 text-sm">エラーが発生しました</p>';});
}
window.loadMore=function(){
  if(isLoading)return;isLoading=true;
  fetch(buildUrl(fetchOffset)).then(function(res){return res.json();}).then(function(d){
    var hasMore=d&&d.length>FETCH_LIMIT;if(hasMore)d=d.slice(0,FETCH_LIMIT);
    if(d&&d.length)g.insertAdjacentHTML('beforeend',d.map(cardHtml).join(''));
    var cEl=document.getElementById('result-count');
    if(cEl){var cur=parseInt(cEl.textContent)||0;cEl.textContent=(cur+(d?d.length:0))+(hasMore?'+':'')+' 件';}
    fetchOffset+=FETCH_LIMIT;
    setLoadMoreVisible(hasMore);
  }).catch(function(){}).finally(function(){isLoading=false;});
};
window.setQuickPeriod=function(p){state.period=p;state.selectedDate=null;updateQfBtns(p);renderCal();loadProducts();};
window.selectDate=function(ds){state.selectedDate=ds;state.period=null;updateQfBtns(null);renderCal();loadProducts();};
window.calMove=function(dir){state.calMonth+=dir;if(state.calMonth>11){state.calMonth=0;state.calYear++;}if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderCal();};
window.setSource=function(src){state.source=src;updateSrcBtns();loadProducts();};
window.toggleBest=function(){state.excludeBest=!state.excludeBest;updateFilterBtns();loadProducts();};
window.toggleVR=function(){state.excludeVR=!state.excludeVR;updateFilterBtns();loadProducts();};
window.clearFilters=function(){state.maker='';state.actress='';state.genre='';['maker','actress','genre'].forEach(function(k){var el=document.getElementById('filter-'+k);if(el)el.value='';});loadProducts();};
(function(){var t={};['maker','actress','genre'].forEach(function(k){var el=document.getElementById('filter-'+k);if(!el)return;el.addEventListener('input',function(){clearTimeout(t[k]);t[k]=setTimeout(function(){state[k]=el.value.trim();loadProducts();},500);});});})();
renderCal();updateQfBtns('all');updateSrcBtns();updateFilterBtns();loadProducts();
})();
</script>
