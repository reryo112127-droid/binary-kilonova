<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', 'Noto Sans JP', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-start justify-center p-4 sm:p-8">
<div class="max-w-2xl w-full bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<form id="rv-form" class="p-6 space-y-6">
<!-- Artwork Info Section -->
<div class="flex items-start gap-4 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-800">
<img id="rv-img" class="w-24 h-32 flex-shrink-0 rounded-lg object-cover bg-slate-200 dark:bg-slate-700" src="" alt=""/>
<div class="flex flex-col justify-center">
<h3 id="rv-title" class="text-slate-900 dark:text-slate-100 text-lg font-bold"></h3>
<p id="rv-meta" class="text-slate-500 dark:text-slate-400 text-sm mt-1"></p>
</div>
</div>
<!-- Rating Selector -->
<div class="space-y-3">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">評価を選択してください <span class="text-red-500 text-sm">*</span></p>
<div class="flex gap-2" id="rv-stars">
<button class="text-slate-300 dark:text-slate-600 hover:scale-110 transition-transform" type="button" data-star="1"><span class="material-symbols-outlined !text-4xl">star</span></button>
<button class="text-slate-300 dark:text-slate-600 hover:scale-110 transition-transform" type="button" data-star="2"><span class="material-symbols-outlined !text-4xl">star</span></button>
<button class="text-slate-300 dark:text-slate-600 hover:scale-110 transition-transform" type="button" data-star="3"><span class="material-symbols-outlined !text-4xl">star</span></button>
<button class="text-slate-300 dark:text-slate-600 hover:scale-110 transition-transform" type="button" data-star="4"><span class="material-symbols-outlined !text-4xl">star</span></button>
<button class="text-slate-300 dark:text-slate-600 hover:scale-110 transition-transform" type="button" data-star="5"><span class="material-symbols-outlined !text-4xl">star</span></button>
</div>
<p id="rv-label" class="text-sm text-slate-400">タップして評価</p>
</div>
<!-- Review Title Input -->
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-base font-bold" for="review-title">レビューのタイトル</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 text-base" id="review-title" placeholder="最も伝えたいことを一言で入力してください" type="text"/>
</div>
<!-- Review Body Textarea -->
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-base font-bold" for="review-body">レビュー本文 <span class="text-red-500 text-sm">*</span></label>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary p-4 text-base resize-none" id="review-body" placeholder="作品の感想や、あなたのお気に入りのポイントを自由に書いてください" rows="6"></textarea>
</div>
<p id="rv-error" class="text-xs text-red-500 font-bold hidden"></p>
<!-- Action Buttons -->
<div class="flex flex-col-reverse sm:flex-row gap-3 pt-6 border-t border-slate-100 dark:border-slate-800">
<button class="flex-1 px-6 py-3 rounded-xl text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button" onclick="history.back()">
                    キャンセル
                </button>
<button id="rv-submit" class="flex-[2] px-6 py-3 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20" type="button">
                    レビューを投稿する
                </button>
</div>
</form>
</div>
<script>
(function(){
  var id = decodeURIComponent((location.pathname.match(/\/review\/add\/(.+)/) || [])[1] || '');
  if (!id) return;

  fetch('/api/product/' + encodeURIComponent(id))
    .then(function(r){ return r.json(); })
    .then(function(p){
      var img = document.getElementById('rv-img');
      if (img && p.main_image_url) img.src = p.main_image_url;
      var ttl = document.getElementById('rv-title');
      if (ttl) ttl.textContent = p.title || '';
      var meta = document.getElementById('rv-meta');
      if (meta) {
        var parts = [];
        if (p.actresses) parts.push(p.actresses.split(',')[0].trim());
        if (p.sale_start_date) parts.push(p.sale_start_date.slice(0,4) + '年');
        meta.textContent = parts.join(' · ');
      }
    }).catch(function(){});

  var rating = 0;
  var labels = ['','残念','いまいち','ふつう','満足','感動した！'];
  var starBtns = document.querySelectorAll('#rv-stars [data-star]');
  function updateStars(n) {
    starBtns.forEach(function(btn) {
      var v = Number(btn.getAttribute('data-star'));
      var icon = btn.querySelector('.material-symbols-outlined');
      if (v <= n) {
        btn.className = btn.className.replace(/text-slate-\d+/g, '').trim() + ' text-primary';
        if (icon) icon.style.fontVariationSettings = "'FILL' 1";
      } else {
        btn.className = btn.className.replace('text-primary', '').trim() + ' text-slate-300';
        if (icon) icon.style.fontVariationSettings = "'FILL' 0";
      }
    });
    document.getElementById('rv-label').textContent = labels[n] || 'タップして評価';
  }
  starBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      rating = Number(btn.getAttribute('data-star'));
      updateStars(rating);
    });
  });

  document.getElementById('rv-submit').addEventListener('click', function() {
    var comment = document.getElementById('review-body').value.trim();
    var errEl = document.getElementById('rv-error');
    if (!rating) { errEl.textContent = '評価を選択してください'; errEl.classList.remove('hidden'); return; }
    if (!comment) { errEl.textContent = 'レビュー本文を入力してください'; errEl.classList.remove('hidden'); return; }
    errEl.classList.add('hidden');

    var btn = document.getElementById('rv-submit');
    btn.disabled = true; btn.textContent = '送信中...';

    var sid = localStorage.getItem('session_id') || '';
    if (!sid) { sid = crypto.randomUUID(); localStorage.setItem('session_id', sid); }

    fetch('/api/review/' + encodeURIComponent(id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-session-id': sid },
      body: JSON.stringify({ stars: rating, title: document.getElementById('review-title').value.trim() || undefined, comment: comment })
    })
    .then(function(r){ return r.json(); })
    .then(function(){ location.href = '/review/success?from=' + encodeURIComponent(id); })
    .catch(function(){ btn.disabled = false; btn.textContent = 'レビューを投稿する'; errEl.textContent = 'エラーが発生しました'; errEl.classList.remove('hidden'); });
  });
})();
</script>
</body></html>
