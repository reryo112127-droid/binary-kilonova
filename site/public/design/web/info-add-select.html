<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>報告種類の選択</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- TopNavBar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 py-4 bg-background-light dark:bg-background-dark px-4 md:px-8">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 bg-primary/10 rounded-lg text-primary">
<span class="material-symbols-outlined text-2xl">database</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">データベース管理</h2>
</div>
<div class="flex gap-3">
<button class="flex size-10 cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="flex size-10 cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<main class="flex flex-col items-center justify-center px-4 py-12 flex-1 flex flex-col items-center justify-center min-h-[calc(100vh-73px)]">
<div class="max-w-4xl w-full">
<!-- Heading -->
<div class="text-center mb-12">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl md:text-3xl font-bold leading-tight mb-4">報告する情報の種類を選択してください</h1>
<p class="text-slate-500 dark:text-slate-400">適切なカテゴリを選択して情報を送信してください。正確な情報の登録にご協力をお願いします。</p>
</div>
<!-- Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
<!-- Option 1: SNS Account -->
<button onclick="location.href='/actress/sns-register'" class="group flex flex-col items-start p-8 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-xl hover:border-primary dark:hover:border-primary transition-all text-left shadow-sm hover:shadow-md">
<div class="flex items-center justify-center size-14 bg-primary/10 text-primary rounded-xl mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">share</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-3">SNSアカウント情報を入力する</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">出演者のSNS（X, Instagram）情報を有志で登録・更新する場合に選択してください。</p>
<div class="mt-8 flex items-center text-primary font-bold text-sm">
                            選択する <span class="material-symbols-outlined ml-1">arrow_forward</span>
</div>
</button>
<!-- Option 2: Name Change -->
<button onclick="location.href='/actress/rename-report'" class="group flex flex-col items-start p-8 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-xl hover:border-primary dark:hover:border-primary transition-all text-left shadow-sm hover:shadow-md">
<div class="flex items-center justify-center size-14 bg-primary/10 text-primary rounded-xl mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">edit_note</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-3">改名情報を報告する</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                            出演者の改名や事務所移籍に伴う芸名の変更を報告する場合に選択してください。
                        </p>
<div class="mt-8 flex items-center text-primary font-bold text-sm">
                            選択する <span class="material-symbols-outlined ml-1">arrow_forward</span>
</div>
</button>
</div>
<!-- Footer Actions -->
<div class="flex justify-center">
<button onclick="history.back()" class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-6 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 text-sm font-bold transition-colors">
                        キャンセル
                    </button>
</div>
</div>
</main>
<!-- Sidebar (Simulated Desktop Navigation) -->
</div>
</body></html>
