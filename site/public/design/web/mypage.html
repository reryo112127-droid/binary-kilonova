<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#ec5b13", "background-light": "#f8f6f6", "background-dark": "#221610" },
                fontFamily: { "display": ["Public Sans", "Noto Sans JP", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    body { font-family: 'Public Sans', 'Noto Sans JP', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    [data-tab-content] { display: none; }
    [data-tab-content].active { display: block; }
</style>
</head>
<body class="bg-white dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

<!-- Header -->
<header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark sticky top-0 z-50">
  <div class="max-w-[1200px] mx-auto flex items-center justify-between px-6 py-4">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2 text-primary">
        <span class="material-symbols-outlined text-3xl">database</span>
        <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">ProductDB</h1>
      </div>
      <div class="hidden md:flex items-center">
        <label class="relative flex items-center min-w-[300px]">
          <span class="material-symbols-outlined absolute left-3 text-slate-400">search</span>
          <input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl py-2 pl-10 pr-4 focus:ring-2 focus:ring-primary/50 text-sm" placeholder="検索..." type="text"/>
        </label>
      </div>
    </div>
    <nav class="hidden lg:flex items-center gap-6">
      <a class="text-sm font-medium hover:text-primary transition-colors" href="/new">新着</a>
      <a class="text-sm font-medium hover:text-primary transition-colors" href="/pre-order">予約</a>
      <a class="text-sm font-medium hover:text-primary transition-colors" href="/ranking">ランキング</a>
      <a class="text-sm font-medium text-primary underline underline-offset-4" href="/mypage">マイページ</a>
      <a class="text-sm font-medium hover:text-primary transition-colors" href="/info/add">情報追加</a>
    </nav>
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
        <span class="material-symbols-outlined text-primary">person</span>
      </div>
      <button class="lg:hidden material-symbols-outlined">menu</button>
    </div>
  </div>
</header>

<main class="flex-1 max-w-[1100px] mx-auto w-full px-4 py-8">
  <section>
    <!-- Tabs -->
    <div class="flex border-b border-slate-200 dark:border-slate-800 mb-8 overflow-x-auto" id="profileTabs">
      <button class="px-6 py-4 text-sm font-bold border-b-2 border-primary text-primary whitespace-nowrap transition-all" data-tab="liked-works">いいねした作品</button>
      <button class="px-6 py-4 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 border-b-2 border-transparent whitespace-nowrap transition-all" data-tab="reviewed-works">レビューした作品</button>
      <button class="px-6 py-4 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 border-b-2 border-transparent whitespace-nowrap transition-all" data-tab="liked-performers">いいねした女優</button>
      <button class="px-6 py-4 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 border-b-2 border-transparent whitespace-nowrap transition-all" data-tab="contributions">貢献</button>
    </div>

    <!-- いいねした作品 -->
    <div class="active" data-tab-content="" id="liked-works">
      <div id="liked-works-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
        <!-- skeleton -->
        <div class="animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-3/4 mb-1"></div><div class="h-2 bg-slate-100 rounded w-1/2"></div></div>
        <div class="animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-3/4 mb-1"></div><div class="h-2 bg-slate-100 rounded w-1/2"></div></div>
        <div class="animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-3/4 mb-1"></div><div class="h-2 bg-slate-100 rounded w-1/2"></div></div>
        <div class="animate-pulse"><div class="aspect-[3/4] rounded-lg bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-3/4 mb-1"></div><div class="h-2 bg-slate-100 rounded w-1/2"></div></div>
      </div>
    </div>

    <!-- レビューした作品 -->
    <div data-tab-content="" id="reviewed-works">
      <div id="reviewed-works-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- skeleton -->
        <div class="animate-pulse bg-white dark:bg-slate-800/40 rounded-xl border border-slate-200 dark:border-slate-800 p-4 flex gap-4">
          <div class="w-24 aspect-[3/4] flex-shrink-0 rounded bg-slate-100"></div>
          <div class="flex-1 space-y-2 pt-1"><div class="h-3 bg-slate-100 rounded w-3/4"></div><div class="h-2 bg-slate-100 rounded w-1/2"></div><div class="h-2 bg-slate-100 rounded w-full mt-4"></div><div class="h-2 bg-slate-100 rounded w-5/6"></div></div>
        </div>
      </div>
    </div>

    <!-- いいねした出演者 -->
    <div data-tab-content="" id="liked-performers">
      <div id="liked-performers-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-6">
        <!-- skeleton -->
        <div class="flex flex-col items-center animate-pulse"><div class="w-24 h-24 rounded-full bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-16"></div></div>
        <div class="flex flex-col items-center animate-pulse"><div class="w-24 h-24 rounded-full bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-16"></div></div>
        <div class="flex flex-col items-center animate-pulse"><div class="w-24 h-24 rounded-full bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-16"></div></div>
        <div class="flex flex-col items-center animate-pulse"><div class="w-24 h-24 rounded-full bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-16"></div></div>
        <div class="flex flex-col items-center animate-pulse"><div class="w-24 h-24 rounded-full bg-slate-100 mb-3"></div><div class="h-3 bg-slate-100 rounded w-16"></div></div>
      </div>
    </div>

    <!-- 貢献 -->
    <div data-tab-content="" id="contributions">
      <div class="max-w-2xl space-y-5">
        <!-- バッジカード -->
        <div id="contrib-badge-card" class="rounded-2xl bg-gradient-to-br from-primary/10 to-amber-50 dark:from-primary/20 dark:to-slate-800 border border-primary/20 p-6 flex items-center gap-5">
          <div id="contrib-badge-emoji" class="text-5xl w-16 h-16 flex items-center justify-center bg-white dark:bg-slate-900 rounded-2xl shadow-sm shrink-0">🥉</div>
          <div class="flex-1">
            <div id="contrib-badge-label" class="text-xs font-bold text-primary mb-1">ブロンズ</div>
            <div class="flex items-baseline gap-1">
              <span id="contrib-count" class="text-4xl font-black text-slate-900 dark:text-white">0</span>
              <span class="text-sm text-slate-500">件の女優特定に貢献</span>
            </div>
            <div id="contrib-next" class="mt-1.5 text-xs text-slate-400"></div>
          </div>
        </div>
        <!-- 進捗バー -->
        <div id="contrib-progress-wrap" class="space-y-1">
          <div class="flex justify-between text-xs text-slate-400">
            <span id="contrib-progress-label">次のランクまで</span>
            <span id="contrib-progress-pct"></span>
          </div>
          <div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
            <div id="contrib-progress-bar" class="h-full bg-primary rounded-full transition-all" style="width:0%"></div>
          </div>
        </div>
        <!-- バッジ一覧 -->
        <div>
          <div class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">バッジ一覧</div>
          <div class="grid grid-cols-5 gap-3">
            <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
              <span class="text-2xl">🥉</span><span class="text-xs font-bold text-slate-600">ブロンズ</span><span class="text-[10px] text-slate-400">1件〜</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
              <span class="text-2xl">🥈</span><span class="text-xs font-bold text-slate-600">シルバー</span><span class="text-[10px] text-slate-400">5件〜</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
              <span class="text-2xl">🥇</span><span class="text-xs font-bold text-slate-600">ゴールド</span><span class="text-[10px] text-slate-400">20件〜</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
              <span class="text-2xl">💎</span><span class="text-xs font-bold text-slate-600">プラチナ</span><span class="text-[10px] text-slate-400">50件〜</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">
              <span class="text-2xl">🏆</span><span class="text-xs font-bold text-slate-600">殿堂入り</span><span class="text-[10px] text-slate-400">100件〜</span>
            </div>
          </div>
        </div>
        <!-- 最近の貢献 -->
        <div>
          <div class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">最近の貢献</div>
          <div id="contrib-recent" class="bg-white dark:bg-slate-800/40 rounded-xl border border-slate-200 dark:border-slate-800 divide-y divide-slate-100 dark:divide-slate-800 overflow-hidden"></div>
        </div>
        <a href="/ranking/contributor" class="flex items-center justify-center gap-2 w-full py-3 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-400 hover:border-primary hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-base">leaderboard</span>
          貢献者ランキングを見る
        </a>
      </div>
    </div>

  </section>
</main>
</div>

<script>
(function(){
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function poster(url){if(!url)return '';if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');if(url.includes('/digital/amateur/')&&url.endsWith('jm.jpg'))return url.replace('jm.jpg','jp-001.jpg');return url;}

  function getSessionId(){
    var s=localStorage.getItem('_sid');
    if(!s){s=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('_sid',s);}
    return s;
  }
  var SID=getSessionId();

  // ─── タブ切り替え ───────────────────────────────────────────
  var tabButtons=document.querySelectorAll('#profileTabs button');
  var tabContents=document.querySelectorAll('[data-tab-content]');
  var loadedTabs={};

  tabButtons.forEach(function(btn){
    btn.addEventListener('click',function(){
      var tabId=btn.getAttribute('data-tab');
      tabButtons.forEach(function(b){
        b.classList.remove('text-primary','font-bold','border-primary');
        b.classList.add('text-slate-500','font-medium','border-transparent');
      });
      btn.classList.add('text-primary','font-bold','border-primary');
      btn.classList.remove('text-slate-500','font-medium','border-transparent');
      tabContents.forEach(function(c){
        c.id===tabId?c.classList.add('active'):c.classList.remove('active');
      });
      if(!loadedTabs[tabId]){
        loadedTabs[tabId]=true;
        if(tabId==='liked-works') loadLikedWorks();
        else if(tabId==='reviewed-works') loadReviewedWorks();
        else if(tabId==='liked-performers') loadLikedPerformers();
        else if(tabId==='contributions') loadContributions();
      }
    });
  });

  // 初期ロード
  loadLikedWorks();
  loadedTabs['liked-works']=true;

  // ─── いいねした作品 ─────────────────────────────────────────
  function loadLikedWorks(){
    fetch('/api/mypage/likes',{headers:{'x-session-id':SID}})
      .then(function(r){return r.json();})
      .then(function(data){
        var grid=document.getElementById('liked-works-grid');
        if(!grid)return;
        if(!data||!data.length){
          grid.innerHTML='<p class="text-sm text-slate-400 col-span-4 py-16 text-center">まだいいねした作品がありません</p>';
          return;
        }
        grid.innerHTML=data.map(function(p){
          var img=poster(p.main_image_url);
          var actress=p.actresses?p.actresses.split(',')[0].trim():'';
          return '<a href="/product/'+encodeURIComponent(p.product_id)+'" class="group cursor-pointer block">'
            +'<div class="aspect-[3/4] rounded-lg overflow-hidden bg-slate-100 dark:bg-slate-800 relative mb-3">'
            +(img?'<img class="w-full h-full object-cover object-right group-hover:scale-105 transition-transform duration-300" src="'+esc(img)+'" alt=""/>':'')
            +'<div class="absolute bottom-2 right-2 flex gap-1.5">'
            +'<button onclick="event.preventDefault()" class="p-1.5 bg-white/90 rounded-full shadow-sm text-primary"><span class="material-symbols-outlined text-lg">favorite</span></button>'
            +'</div></div>'
            +'<h3 class="text-sm font-semibold truncate group-hover:text-primary transition-colors">'+esc(p.title||'')+'</h3>'
            +(actress?'<p class="text-xs text-slate-500">'+esc(actress)+'</p>':'')
            +'</a>';
        }).join('');
      })
      .catch(function(){
        var grid=document.getElementById('liked-works-grid');
        if(grid) grid.innerHTML='<p class="text-sm text-slate-400 col-span-4 py-16 text-center">読み込みに失敗しました</p>';
      });
  }

  // ─── レビューした作品 ───────────────────────────────────────
  function loadReviewedWorks(){
    var list=document.getElementById('reviewed-works-list');
    if(!list)return;
    list.innerHTML='<p class="text-sm text-slate-400 col-span-2 py-16 text-center">まだレビューした作品がありません</p>';
  }

  // ─── いいねした出演者 ───────────────────────────────────────
  function loadLikedPerformers(){
    fetch('/api/mypage/actress-likes',{headers:{'x-session-id':SID}})
      .then(function(r){return r.json();})
      .then(function(data){
        var grid=document.getElementById('liked-performers-grid');
        if(!grid)return;
        if(!data||!data.length){
          grid.innerHTML='<p class="text-sm text-slate-400 col-span-5 py-16 text-center">まだいいねした女優がいません</p>';
          return;
        }
        grid.innerHTML=data.map(function(a){
          return '<a href="/actress/'+encodeURIComponent(a.name||'')+'" class="flex flex-col items-center group cursor-pointer">'
            +'<div class="w-24 h-24 rounded-full overflow-hidden border-2 border-slate-100 dark:border-slate-800 mb-3 group-hover:border-primary/50 transition-colors bg-slate-100">'
            +(a.image_url?'<img class="w-full h-full object-cover object-top" src="'+esc(a.image_url)+'" alt=""/>':'')
            +'</div>'
            +'<span class="text-sm font-semibold text-slate-900 dark:text-white group-hover:text-primary transition-colors text-center">'+esc(a.name||'')+'</span>'
            +'</a>';
        }).join('');
      })
      .catch(function(){
        var grid=document.getElementById('liked-performers-grid');
        if(grid) grid.innerHTML='<p class="text-sm text-slate-400 col-span-5 py-16 text-center">読み込みに失敗しました</p>';
      });
  }

  // ─── 貢献 ───────────────────────────────────────────────────
  function loadContributions(){
    var BADGES=[
      {min:100,label:'殿堂入り',emoji:'🏆'},
      {min:50, label:'プラチナ', emoji:'💎'},
      {min:20, label:'ゴールド', emoji:'🥇'},
      {min:5,  label:'シルバー', emoji:'🥈'},
      {min:1,  label:'ブロンズ', emoji:'🥉'},
    ];
    fetch('/api/mypage/contributions',{headers:{'x-session-id':SID}})
      .then(function(r){return r.json();})
      .then(function(d){
        var count=d.count||0;
        var cur=BADGES.find(function(b){return count>=b.min;})||null;
        var emojiEl=document.getElementById('contrib-badge-emoji');
        var labelEl=document.getElementById('contrib-badge-label');
        var countEl=document.getElementById('contrib-count');
        if(emojiEl) emojiEl.textContent=cur?cur.emoji:'—';
        if(labelEl) labelEl.textContent=cur?cur.label:'まだバッジなし';
        if(countEl) countEl.textContent=String(count);

        var nextBadge=null;
        for(var i=BADGES.length-1;i>=0;i--){if(count<BADGES[i].min){nextBadge=BADGES[i];break;}}
        var nextEl=document.getElementById('contrib-next');
        var barEl=document.getElementById('contrib-progress-bar');
        var pctEl=document.getElementById('contrib-progress-pct');
        var lblEl=document.getElementById('contrib-progress-label');
        if(nextBadge){
          var prev=cur?cur.min:0;
          var pct=Math.round((count-prev)/(nextBadge.min-prev)*100);
          if(nextEl) nextEl.textContent=nextBadge.emoji+' '+nextBadge.label+'まであと'+(nextBadge.min-count)+'件';
          if(barEl) barEl.style.width=Math.min(pct,100)+'%';
          if(pctEl) pctEl.textContent=pct+'%';
          if(lblEl) lblEl.textContent=nextBadge.label+'まで';
        } else {
          if(nextEl) nextEl.textContent='🎉 最高ランク達成！';
          if(barEl) barEl.style.width='100%';
          var pw=document.getElementById('contrib-progress-wrap');
          if(pw) pw.style.display='none';
        }

        var recentEl=document.getElementById('contrib-recent');
        if(recentEl&&d.recent&&d.recent.length){
          recentEl.innerHTML=d.recent.map(function(r){
            var dt=new Date(r.created_at);
            var ds=isNaN(dt)?'':((dt.getMonth()+1)+'/'+dt.getDate());
            return '<a href="/product/'+encodeURIComponent(r.product_id)+'" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">'
              +'<span class="material-symbols-outlined text-primary text-sm">person_add</span>'
              +'<span class="flex-1 text-sm font-bold uppercase">'+esc(r.product_id)+'</span>'
              +(ds?'<span class="text-xs text-slate-400">'+ds+'</span>':'')
              +'</a>';
          }).join('');
        } else if(recentEl){
          recentEl.innerHTML='<p class="text-sm text-slate-400 px-4 py-4">まだ貢献がありません。作品ページの「出演者を追加」ボタンで女優を特定しましょう！</p>';
        }
      }).catch(function(){});
  }
})();
</script>
</body></html>
