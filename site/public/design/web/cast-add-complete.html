<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4 md:px-10 lg:px-40">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">edit_note</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">出演者情報登録完了</h2>
</div>
</header>
<!-- Main Content Container -->
<main class="flex flex-1 justify-center py-12 px-6 md:px-10">
<div class="layout-content-container flex flex-col max-w-[560px] flex-1 items-center text-center">
<!-- Success Icon Section -->
<div class="mb-8 flex flex-col items-center">
<div class="flex items-center justify-center w-24 h-24 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 mb-6">
<span class="material-symbols-outlined !text-6xl">check_circle</span>
</div>
<h4 class="text-green-600 dark:text-green-400 text-sm font-bold leading-normal tracking-[0.1em] uppercase">送信完了</h4>
</div>
<!-- Message Section -->
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight pb-4">出演者情報を登録しました</h3>
<p class="text-slate-600 dark:text-slate-400 text-lg font-normal leading-relaxed max-w-md mx-auto">作品の出演者情報が正常に登録されました。<br/>データベースの充実にご協力いただきありがとうございます。</p>
<!-- Illustration/Placeholder -->
<div class="flex w-full max-w-md my-10 aspect-[16/9] rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-800">
<div class="w-full h-full bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center" data-alt="Abstract orange and white soft gradient background">
<span class="material-symbols-outlined text-primary/20 !text-8xl">verified_user</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 w-full max-w-md mt-4 justify-center">
<button class="flex items-center justify-center h-14 bg-primary text-white rounded-xl text-base font-bold transition-all hover:brightness-110 active:scale-95 shadow-lg shadow-primary/20 w-full">
                            ホームに戻る
                        </button>
</div>
<!-- Support Footer -->
<div class="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800 w-full">
<p class="text-slate-400 dark:text-slate-500 text-sm">作品の出演者情報が正常に登録されました。<br/>データベースの充実にご協力いただきありがとうございます。</p>
</div>
</div>
</main>
</div>
</div>
</body></html>
