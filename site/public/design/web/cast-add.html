<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

            darkMode: "class",
            theme: {

                        "primary": "#ec5b13",

<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 md:px-10 py-3 sticky top-0 z-50">

<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>

</div>

<label class="flex flex-col min-w-40 h-10 w-full max-w-md" style="">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-100 dark:bg-slate-800">
<div class="text-slate-500 dark:text-slate-400 flex items-center justify-center pl-4">
<span class="material-symbols-outlined" style="">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 border-none bg-transparent focus:ring-0 h-full placeholder:text-slate-500 text-base font-normal px-2" placeholder="作品、俳優を検索" value=""/>
</div>
</label>
</div>
<div class="flex items-center justify-end gap-4">
<button class="p-2 text-slate-600 dark:text-slate-300" style="">
<span class="material-symbols-outlined" style="">notifications</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-primary/20" data-alt="User profile avatar circle" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDW5SWcC7PE0m-s8hzzNr03CM7JcBYbEvsYEOinT9ESFTOKqSyY-bQFFzjDu3BGS1wYYajxO84D2hl9bFSt1bSttvabhKaQ5uzogLrnZhcnkBRn2-9KdNAO9C56JQjrS-BGAQIPEX7XcgX0G124Sui8XjYnqC_t6lyVYcqqUaSHcSUn0cQ6koZeDwAmFWYAaZ205HukBvEM4pwNwjQz13h1BQxduJOVFq6d9MDWVWC0-Ce3xU_uLqVVHNPgDfSSYLFboKrjDI7LRyQ");'></div>

</header>
<main class="flex flex-1 justify-center py-8 px-4 md:px-0">
<div class="layout-content-container flex flex-col max-w-[800px] flex-1 gap-6">
<!-- Title Section -->
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight" style="">出演者を登録する</h1>
<p class="text-slate-600 dark:text-slate-400 text-sm" style="">作品に出演しているAV女優の名前を入力して下さい。</p>
</div>
<!-- Work Info Card -->
<div class="rounded-xl bg-white dark:bg-slate-800 p-5 shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row gap-6">
<div class="w-full md:w-48 bg-center bg-no-repeat aspect-video md:aspect-square bg-cover rounded-lg shrink-0" data-alt="Cinematic landscape with dramatic sunset horizon" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBycJseXobwYnD0SsHRDMFFP0CTczl_m4JrCJiDKNA8j9BdtL34Aqoorv31kJ4z5zS8uLpyMmetKKN5Y8i75zHpwAcpwcLelzRvcjgyFOTa0Bti1n-yOcNuOuFHxz4Ybhj5uvkK7vBIQGwhOcwNtRG9hwGrkJX-rUCMYjYZzeNSpv98XsmgltqCUBmoDxKhNnarrtH34YhRMlVV9MC3uta3CMbiZQouMV3b7XHMphTVTFoUudQFRRP8Cmt5fM2M8H8fs25A87dNOmg");'></div>

<h3 class="text-slate-900 dark:text-white text-2xl font-bold" style="">悠久の地平線</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm line-clamp-2" style=""><br/></p>
<div class="flex items-center gap-2 mt-2">
<span class="bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded text-xs text-slate-600 dark:text-slate-300" style="">SF</span>
<span class="bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded text-xs text-slate-600 dark:text-slate-300" style="">ファンタジー</span>
</div>
</div>
</div>
<!-- Registration Form -->
<div class="bg-white dark:bg-slate-800 rounded-xl p-6 md:p-8 shadow-sm border border-slate-200 dark:border-slate-700">
<form class="flex flex-col gap-6">
<!-- Performer Names -->
<div class="flex flex-col gap-4">
<label class="text-slate-900 dark:text-white text-sm font-bold" style="">
                                出演者名
                            </label>
<div class="flex flex-col gap-3" id="performer-list">
<div class="flex items-center gap-2">
<input class="form-input flex-1 rounded-xl border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-12" type="text"/>
<button class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300" style="" type="button">
<span class="material-symbols-outlined" style="">close</span>
</button>
</div>
<div class="flex items-center gap-2">
<input class="form-input flex-1 rounded-xl border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-12" type="text"/>
<button class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300" style="" type="button">
<span class="material-symbols-outlined" style="">close</span>
</button>
</div>
</div>
<button class="flex items-center justify-center gap-2 w-full py-3 mt-2 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:border-primary hover:text-primary transition-colors" style="" type="button">
<span class="material-symbols-outlined" style="">add</span>

                            </button>
</div>

<div class="flex flex-col sm:flex-row items-center justify-end gap-4 pt-6 border-t border-slate-200 dark:border-slate-700">
<button class="w-full sm:w-auto px-8 py-3 rounded-xl text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" style="" type="button">
                                キャンセル
                            </button>
<button class="w-full sm:w-auto bg-primary hover:bg-primary/90 text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" style="" type="submit">
<span class="material-symbols-outlined" style="">send</span>
                                情報を送信する
                            </button>
</div>
</form>
</div>
<!-- Help text -->
<div class="flex items-start gap-3 p-4 bg-primary/10 rounded-xl border border-primary/20">
<span class="material-symbols-outlined text-primary" style="">info</span>
<p class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed" style="">
                        登録された情報は管理者による審査後、作品ページに反映されます。信頼性の高いデータベース構築のため、公式情報に基づいた入力をお願いいたします。
                    </p>
</div>
</div>
</main>
<!-- Footer -->
</div>
</div>
