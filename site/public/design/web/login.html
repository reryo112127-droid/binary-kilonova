<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>ログイン | AVランキング</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="w-full px-6 py-4 flex items-center justify-between bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2">
<div class="text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">
                    database
                </span>
</div>
<h1 class="text-xl font-bold tracking-tight">AVランキング</h1>
</div>
<div class="hidden md:block">
<span class="text-sm text-slate-500 dark:text-slate-400 mr-4">アカウントをお持ちでないですか？</span>
<a class="text-sm font-bold text-primary hover:underline" href="#">新規登録</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-md bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="text-center mb-8">
<h2 class="text-3xl font-black mb-2">ログイン</h2>
<p class="text-slate-500 dark:text-slate-400">データベースにアクセスしてランキングを確認しましょう</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-medium mb-2" for="actress-work">
                        好きな女優名・作品名
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">
                            star
                        </span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="actress-work" placeholder="女優名または作品名を入力" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-2" for="reason">
                        登録時の理由
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">
                            edit_note
                        </span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="reason" placeholder="登録した理由を入力" type="text"/>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400" for="remember">
                        ログイン状態を保持する
                    </label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                    ログイン
                    <span class="material-symbols-outlined">login</span>
</button>
</form>
<div class="mt-8 text-center md:hidden">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    アカウントをお持ちでないですか？ 
                    <a class="font-bold text-primary hover:underline ml-1" href="#">新規登録</a>
</p>
</div>
</div>
</main>
</body></html>
