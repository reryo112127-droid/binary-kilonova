<script>
(function(){
  var ps = new URLSearchParams(location.search);
  var actress=ps.get('actress')||'', maker=ps.get('maker')||'', label=ps.get('label')||'', genre=ps.get('genre')||'', q=ps.get('q')||'';
  var term = actress||maker||label||genre||q;

  var titleEl = document.getElementById('search-title');
  if (titleEl && term) { titleEl.textContent = term; document.title = term + ' - 検索結果'; }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function poster(url){if(!url)return'';if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');if(url.includes('/digital/amateur/')function poster(url){if(!url)return'';if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');return url;}function poster(url){if(!url)return'';if(url.includes('pb_e_'))return url.replace('pb_e_','pf_e_');return url;}url.endsWith('jm.jpg'))return url.replace('jm.jpg','jp-001.jpg');return url;}

  var ITEMS_PER_PAGE=40,currentPage=1,filteredCache=[],fetchOffset=0;
  var filters = { contentType:'all', sortOrder:'popular', source:'', showBest:true, vrOnly:false, fromDate:'', toDate:'', subMaker:'', subGenres:[] };
  var FETCH_LIMIT=200;

  function buildUrl(off){
    var p = new URLSearchParams();
    p.set('limit',String(FETCH_LIMIT+1));
    p.set('offset',String(off||0));
    if (filters.vrOnly) { p.set('excludeGenres','VR'); }
    else if (actress) p.set('actress',actress);
    else if (maker) p.set('maker',maker);
    else if (label) p.set('label',label);
    else if (genre) p.set('genre',genre);
    else if (q) p.set('q',q);

    if (filters.contentType==='pre-order') p.set('sort','pre-order');
    else if (filters.contentType==='new') p.set('sort','new');
    else p.set('sort', filters.sortOrder==='new' ? 'new' : 'wish_count');

    if (filters.source) p.set('source',filters.source);
    if (!filters.showBest) p.set('excludeBest','1');
    if (filters.fromDate) p.set('fromDate',filters.fromDate);
    if (filters.toDate) p.set('toDate',filters.toDate);
    return '/api/products?'+p.toString();
  }
  function setLoadMoreVisible(v){
    var w=document.getElementById('load-more-wrap');
    if(w)w.style.cssText=v?'display:flex;justify-content:center;margin-top:1rem':'display:none!important';
  }

  var allResults = [];
  var grid = document.getElementById('search-results-grid');

  function cardHtml(p){
    var img = poster(p.main_image_url);
    var noAct = !(p.actresses&&p.actresses.trim());
    return '<a href="/product/'+encodeURIComponent(p.product_id)+'" class="bg-white border border-gray-100 rounded-xl overflow-hidden flex flex-col hover:shadow-xl transition duration-300 group block">'
      +'<div class="bg-gray-50 relative overflow-hidden aspect-[3/4]">'
      +(img?'<img class="w-full h-full object-cover object-right group-hover:scale-105 transition-transform" src="'+esc(img)+'" alt="" loading="lazy"/>':'')
      +'<div class="absolute bottom-2 right-2 flex gap-1">'
      +(noAct?'<button data-pid="'+esc(p.product_id)+'" class="w-6 h-6 flex items-center justify-center bg-black/30 backdrop-blur rounded-full text-white" onclick="event.preventDefault();event.stopPropagation();location.href=\'/cast/register/\'+encodeURIComponent(this.dataset.pid)"><span class="material-symbols-outlined text-[14px]">add</span></button>':'')
      +'<button data-like-pid="'+esc(p.product_id)+'" class="w-6 h-6 flex items-center justify-center bg-black/30 backdrop-blur rounded-full text-white" onclick="event.preventDefault();event.stopPropagation();toggleLike(this,this.dataset.likePid)"><span class="material-symbols-outlined text-[14px]">favorite</span></button>'
      +'</div></div>'
      +'<div class="p-3 flex flex-col flex-1">'
      +'<p class="text-xs font-bold line-clamp-2 mb-1">'+esc(p.title||'')+'</p>'
      +(p.actresses?'<p class="text-[10px] text-primary truncate">'+esc(p.actresses.split(',')[0].trim())+'</p>':'')
      +'</div></a>';
  }

  function renderPagination(total){
    var pgWrap=document.getElementById('pagination-wrap');
    if(!pgWrap)return;
    var isFirst=currentPage===1,isLast=(currentPage*ITEMS_PER_PAGE)>=total;
    var pc='p-2 text-gray-200 cursor-not-allowed',pa='p-2 text-gray-400 hover:text-blue-600 transition';
    var prev='<button '+(isFirst?'disabled ':'')+' onclick="srchPage('+(currentPage-1)+')" class="'+(isFirst?pc:pa)+'"><svg class="h-4 w-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" fill-rule="evenodd"></path></svg></button>';
    var next='<button '+(isLast?'disabled ':'')+' onclick="srchPage('+(currentPage+1)+')" class="'+(isLast?pc:pa)+'"><svg class="h-4 w-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" fill-rule="evenodd"></path></svg></button>';
    pgWrap.innerHTML='<nav class="flex items-center space-x-3">'+prev+'<span class="text-xs font-bold text-gray-600 px-2">'+currentPage+' / '+Math.max(1,Math.ceil(total/ITEMS_PER_PAGE))+' ページ</span>'+next+'</nav>';
  }
  function renderFiltered(){
    if (!grid) return;
    var filtered = allResults.slice();
    if (filters.subMaker) filtered = filtered.filter(function(p){ return (p.maker||'') === filters.subMaker; });
    if (filters.subGenres.length) filtered = filtered.filter(function(p){
      var gns = (p.genres||'').split(',').map(function(s){return s.trim();});
      return filters.subGenres.every(function(g){return gns.indexOf(g) !== -1;});
    });
    filteredCache = filtered;
    var cEl=document.getElementById('result-count');if(cEl){cEl.textContent=filtered.length+' 作品';cEl.classList.remove('hidden');}
    if (!filtered.length) { grid.innerHTML='<div class="col-span-5 py-12 text-center text-sm text-gray-400">絞り込み結果がありません</div>'; renderPagination(0); return; }
    var start=(currentPage-1)*ITEMS_PER_PAGE,page=filtered.slice(start,start+ITEMS_PER_PAGE);
    grid.innerHTML = page.map(cardHtml).join('');
    if(window.restoreLikes)window.restoreLikes();
    renderPagination(filtered.length);
  }
  window.srchPage=function(p){if(p<1)return;currentPage=p;window.scrollTo(0,200);renderFiltered();};

  function updateSidebarFilters(data){
    var makerCount = {}, genreCount = {};
    data.forEach(function(p){
      var m = p.maker||'';
      if (m) makerCount[m] = (makerCount[m]||0) + 1;
      (p.genres||'').split(',').forEach(function(g){
        g = g.trim();
        if (g) genreCount[g] = (genreCount[g]||0) + 1;
      });
    });
    var makers = Object.keys(makerCount).sort(function(a,b){return makerCount[b]-makerCount[a];});
    var genres = Object.keys(genreCount).sort(function(a,b){return genreCount[b]-genreCount[a];});

    var makerList = document.getElementById('sf-maker-list');
    if (makerList) {
      if (!makers.length) { makerList.innerHTML='<span class="text-[11px] text-gray-400 px-1">データなし</span>'; }
      else {
        makerList.innerHTML = makers.map(function(m){
          var active = filters.subMaker === m;
          return '<button data-maker="'+esc(m)+'" class="w-full flex items-center justify-between px-2 py-1 rounded-md text-left transition '+(active?'bg-primary/10 text-primary font-bold':'hover:bg-gray-50 text-gray-600')+'">'
            +'<span class="truncate text-[11px] mr-1">'+esc(m)+'</span>'
            +'<span class="text-[10px] text-gray-400 shrink-0">'+makerCount[m]+'</span>'
            +'</button>';
        }).join('');
        makerList.querySelectorAll('[data-maker]').forEach(function(btn){
          btn.addEventListener('click', function(){
            var m = btn.getAttribute('data-maker');
            filters.subMaker = filters.subMaker === m ? '' : m;
            updateSidebarFilters(allResults);
            renderFiltered();
          });
        });
      }
    }

    var genreList = document.getElementById('sf-genre-list');
    if (genreList) {
      if (!genres.length) { genreList.innerHTML='<span class="text-[11px] text-gray-400 px-1">データなし</span>'; }
      else {
        genreList.innerHTML = genres.map(function(g){
          var active = filters.subGenres.indexOf(g) !== -1;
          return '<label class="flex items-center gap-2 px-1 py-0.5 rounded cursor-pointer hover:bg-gray-50 transition">'
            +'<input type="checkbox" '+(active?'checked':'')+' data-genre="'+esc(g)+'" class="rounded-sm border-gray-300 w-3 h-3 accent-primary shrink-0">'
            +'<span class="text-[11px] text-gray-600 flex-1 truncate">'+esc(g)+'</span>'
            +'<span class="text-[10px] text-gray-400 shrink-0">'+genreCount[g]+'</span>'
            +'</label>';
        }).join('');
        genreList.querySelectorAll('[data-genre]').forEach(function(chk){
          chk.addEventListener('change', function(){
            var g = chk.getAttribute('data-genre');
            var idx = filters.subGenres.indexOf(g);
            if (chk.checked && idx === -1) filters.subGenres.push(g);
            else if (!chk.checked && idx !== -1) filters.subGenres.splice(idx, 1);
            renderFiltered();
          });
        });
      }
    }
  }

  function fetchAndRender(){
    if (!grid) return;
    filters.subMaker = ''; filters.subGenres = []; currentPage = 1; fetchOffset = 0;
    grid.innerHTML = '<div class="col-span-5 py-12 text-center text-sm text-gray-400">読み込み中...</div>';
    setLoadMoreVisible(false);
    fetch(buildUrl(0)).then(function(r){return r.json();}).then(function(data){
      var hasMore = data && data.length > FETCH_LIMIT;
      allResults = hasMore ? data.slice(0, FETCH_LIMIT) : (data || []);
      setLoadMoreVisible(hasMore);
      updateSidebarFilters(allResults);
      if (!allResults.length){ grid.innerHTML='<div class="col-span-5 py-12 text-center text-sm text-gray-400">作品が見つかりませんでした</div>'; renderPagination(0); return; }
      renderFiltered();
    }).catch(function(){ grid.innerHTML='<div class="col-span-5 py-12 text-center text-sm text-gray-400">エラーが発生しました</div>'; });
  }
  window.fetchMore=function(){
    var btn=document.getElementById('load-more-btn');if(btn){btn.textContent='読み込み中...';btn.disabled=true;}
    fetchOffset+=FETCH_LIMIT;
    fetch(buildUrl(fetchOffset)).then(function(r){return r.json();}).then(function(data){
      var hasMore = data && data.length > FETCH_LIMIT;
      var items = hasMore ? data.slice(0, FETCH_LIMIT) : (data || []);
      allResults = allResults.concat(items);
      setLoadMoreVisible(hasMore);
      if(btn){btn.textContent='さらに読み込む';btn.disabled=false;}
      filters.subMaker='';filters.subGenres=[];currentPage=1;
      updateSidebarFilters(allResults);
      renderFiltered();
    }).catch(function(){if(btn){btn.textContent='さらに読み込む';btn.disabled=false;}});
  };

  // Source toggle (すべて/MGS/FANZA)
  var allSrcBtn=document.getElementById('sf-all-src-btn'), mgsBtn=document.getElementById('sf-mgs-btn'), fanzaBtn=document.getElementById('sf-fanza-btn');
  function updateSourceBtns(){
    var base='flex-1 text-[11px] py-1.5 rounded-md transition ';
    var active='font-bold bg-white shadow-sm text-primary';
    var inactive='font-medium text-gray-500 hover:text-gray-700';
    if(allSrcBtn) allSrcBtn.className=base+(filters.source===''?active:inactive);
    if(mgsBtn) mgsBtn.className=base+(filters.source==='mgs'?active:inactive);
    if(fanzaBtn) fanzaBtn.className=base+(filters.source==='fanza'?active:inactive);
  }
  if(allSrcBtn) allSrcBtn.addEventListener('click',function(){ filters.source=''; updateSourceBtns(); fetchAndRender(); });
  if(mgsBtn) mgsBtn.addEventListener('click',function(){ filters.source='mgs'; updateSourceBtns(); fetchAndRender(); });
  if(fanzaBtn) fanzaBtn.addEventListener('click',function(){ filters.source='fanza'; updateSourceBtns(); fetchAndRender(); });

  // Date range
  var fromInput=document.getElementById('sf-from'), toInput=document.getElementById('sf-to');
  if(fromInput) fromInput.addEventListener('change',function(){ filters.fromDate=fromInput.value; fetchAndRender(); });
  if(toInput) toInput.addEventListener('change',function(){ filters.toDate=toInput.value; fetchAndRender(); });
  var calToday=document.getElementById('sf-cal-today'), calWeek=document.getElementById('sf-cal-week'), calClear=document.getElementById('sf-cal-clear');
  if(calToday) calToday.addEventListener('click',function(){
    var d=new Date(); var s=d.toISOString().slice(0,10);
    filters.fromDate=s; filters.toDate=s;
    if(fromInput)fromInput.value=s; if(toInput)toInput.value=s; fetchAndRender();
  });
  if(calWeek) calWeek.addEventListener('click',function(){
    var d=new Date(); var mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
    var sun=new Date(mon); sun.setDate(mon.getDate()+6);
    filters.fromDate=mon.toISOString().slice(0,10); filters.toDate=sun.toISOString().slice(0,10);
    if(fromInput)fromInput.value=filters.fromDate; if(toInput)toInput.value=filters.toDate; fetchAndRender();
  });
  if(calClear) calClear.addEventListener('click',function(){ filters.fromDate=''; filters.toDate=''; if(fromInput)fromInput.value=''; if(toInput)toInput.value=''; fetchAndRender(); });

  // BEST/VR toggle buttons (now next to 詳細検索)
  var actCls='inline-flex items-center text-[11px] font-bold px-2.5 py-1.5 rounded-lg border transition bg-blue-50 border-blue-200 text-blue-700';
  var inaCls='inline-flex items-center text-[11px] px-2.5 py-1.5 rounded-lg border transition bg-gray-50 border-gray-200 text-gray-600 hover:border-blue-200 hover:text-blue-600';
  var bestBtn=document.getElementById('qf-best'), vrBtn=document.getElementById('qf-vr');
  if(bestBtn) bestBtn.addEventListener('click',function(){ filters.showBest=!filters.showBest; bestBtn.className=(filters.showBest?inaCls:actCls); fetchAndRender(); });
  if(vrBtn) vrBtn.addEventListener('click',function(){ filters.vrOnly=!filters.vrOnly; vrBtn.className=(filters.vrOnly?actCls:inaCls); fetchAndRender(); });

  // Segmented control
  var allBtn=document.getElementById('sf-all-btn'), preBtn=document.getElementById('sf-preorder-btn'), newBtn=document.getElementById('sf-new-btn');
  function updateSegmented(){
    var btns=[allBtn,preBtn,newBtn], vals=['all','pre-order','new'];
    btns.forEach(function(b,i){ if(!b)return; b.className='px-4 py-1.5 text-[11px] rounded-md font-medium transition '+(filters.contentType===vals[i]?'bg-white shadow-sm text-primary font-bold':'text-gray-500 hover:text-gray-700'); });
  }
  if(allBtn) allBtn.addEventListener('click',function(){ filters.contentType='all'; updateSegmented(); fetchAndRender(); });
  if(preBtn) preBtn.addEventListener('click',function(){ filters.contentType='pre-order'; updateSegmented(); fetchAndRender(); });
  if(newBtn) newBtn.addEventListener('click',function(){ filters.contentType='new'; updateSegmented(); fetchAndRender(); });

  // Sort select
  var sortSel=document.getElementById('sf-sort-sel');
  if(sortSel) sortSel.addEventListener('change',function(){ filters.sortOrder=sortSel.value==='新着順'?'new':'popular'; fetchAndRender(); });

  // Clear sub-filters
  var clearBtn = document.getElementById('sf-clear-btn');
  if (clearBtn) clearBtn.addEventListener('click', function(){
    filters.subMaker = ''; filters.subGenres = [];
    updateSidebarFilters(allResults);
    renderFiltered();
  });

  // Actress profile cards (web)
  var profilesWrap = document.getElementById('actress-profiles-wrap');
  if (actress && profilesWrap) {
    var actressNames = actress.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    function calcAge(b){if(!b)return null;var d=new Date(b),t=new Date(),a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a;}
    actressNames.forEach(function(actName){
      fetch('/api/actress/'+encodeURIComponent(actName)).then(function(r){return r.json();}).then(function(p){
        // Stats grid
        var statsData=[];
        if(p.birthday){var age=calcAge(p.birthday);if(age)statsData.push({l:'年齢',v:age+'歳'});}
        if(p.height)statsData.push({l:'身長',v:p.height+'cm'});
        if(p.bust)statsData.push({l:'バスト',v:p.bust+'cm'+(p.cup?'('+p.cup+'カップ)':'')});
        if(p.waist)statsData.push({l:'ウエスト',v:p.waist+'cm'});
        if(p.hip)statsData.push({l:'ヒップ',v:p.hip+'cm'});
        if(p.blood_type)statsData.push({l:'血液型',v:p.blood_type+'型'});
        if(p.prefectures)statsData.push({l:'出身地',v:p.prefectures});
        var statsHtml=statsData.map(function(s){return'<div class="bg-gray-50 rounded-lg p-3"><p class="text-[10px] text-gray-400 mb-1">'+esc(s.l)+'</p><p class="font-bold text-gray-800 text-xs">'+esc(s.v)+'</p></div>';}).join('');
        // SNS
        var snsHtml='';
        if(p.twitter)snsHtml+='<a class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 text-gray-500 hover:text-blue-400 transition border border-gray-100" href="https://x.com/'+esc(p.twitter)+'" target="_blank" rel="noopener"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg></a>';
        if(p.instagram)snsHtml+='<a class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-50 text-gray-500 hover:text-pink-500 transition border border-gray-100" href="https://www.instagram.com/'+esc(p.instagram)+'" target="_blank" rel="noopener"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>';
        // Extra badges
        var extraHtml='';
        if(p.augmented)extraHtml+='<span class="px-2 py-0.5 bg-pink-100 text-pink-600 text-[10px] font-bold rounded-full border border-pink-200">豊胸</span>';
        if(p.aliases&&p.aliases.length)p.aliases.forEach(function(a){extraHtml+='<a href="/actress/'+encodeURIComponent(a)+'" class="px-2 py-0.5 bg-gray-100 text-gray-600 text-[10px] rounded-full border border-gray-200 hover:bg-gray-200 transition">'+esc(a)+'</a>';});
        var displayName=esc(p.name||actName);
        var imgSrc=p.image_url?esc(p.image_url):'';
        var wrap=document.createElement('div');
        wrap.innerHTML='<div class="bg-white border border-gray-100 rounded-2xl p-6 mb-4 shadow-sm flex flex-col md:flex-row gap-8 items-center md:items-start">'
          +'<div class="flex-shrink-0"><div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-white shadow-md bg-gray-100">'
          +(imgSrc?'<img class="w-full h-full object-cover" src="'+imgSrc+'" alt="'+displayName+'" loading="lazy"/>':'')
          +'</div></div>'
          +'<div class="flex-1 text-center md:text-left">'
          +'<div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4 gap-4">'
          +'<div>'
          +'<a href="/actress/'+encodeURIComponent(p.name||actName)+'" class="text-2xl md:text-3xl font-bold text-gray-900 hover:text-primary mb-1 block">'+displayName+'</a>'
          +(extraHtml?'<div class="flex flex-wrap items-center gap-2 mt-1">'+extraHtml+'</div>':'')
          +'</div>'
          +(snsHtml?'<div class="flex items-center justify-center md:justify-end space-x-3">'+snsHtml+'</div>':'')
          +'</div>'
          +(statsHtml?'<div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-xs">'+statsHtml+'</div>':'')
          +'</div></div>';
        profilesWrap.appendChild(wrap.firstChild);
      }).catch(function(){});
    });
  }

  if (term) fetchAndRender();
})();
</script>
</body></html>
