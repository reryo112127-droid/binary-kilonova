<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800"><div class="relative flex items-center justify-center px-4 h-14 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<button class="absolute left-4 p-1 text-slate-600 dark:text-slate-400" onclick="history.back()">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-base font-bold text-slate-900 dark:text-slate-100">レビュー投稿</h1>
</div></header>
<main class="flex-1 pb-24">
<!-- Title & Back Button -->
<!-- Media Info Card -->
<div class="px-4 mb-6">
<div id="rv-product-card" class="flex gap-4 p-4 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800">
<div class="w-32 aspect-video rounded-lg overflow-hidden flex-shrink-0 bg-slate-200 dark:bg-slate-800">
<img id="rv-img" class="w-full h-full object-cover" src="" alt=""/>
</div>
<div class="flex flex-col justify-center">
<h2 id="rv-title" class="text-base font-bold leading-tight line-clamp-2"></h2>
<p id="rv-meta" class="text-xs text-slate-500 dark:text-slate-400 mt-1"></p>
</div>
</div>
</div>
<!-- Rating Section -->
<div class="px-4 mb-6">
<label class="block text-sm font-bold mb-3 text-slate-700 dark:text-slate-300">評価を選択</label>
<div class="flex flex-col items-center p-6 bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="flex gap-2 mb-2" id="rv-stars">
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 !text-4xl cursor-pointer" data-star="1">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 !text-4xl cursor-pointer" data-star="2">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 !text-4xl cursor-pointer" data-star="3">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 !text-4xl cursor-pointer" data-star="4">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 !text-4xl cursor-pointer" data-star="5">star</span>
</div>
<p id="rv-score" class="text-2xl font-black text-slate-900 dark:text-slate-100">-</p>
<p id="rv-label" class="text-xs text-slate-500 dark:text-slate-400">タップして評価</p>
</div>
</div>
<!-- Input Form -->
<div class="px-4 space-y-6">
<div>
<label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300" for="review-title">レビュータイトル</label>
<input class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="review-title" placeholder="一言で表すと？" type="text"/>
</div>
<div>
<label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300" for="review-content">レビュー本文</label>
<textarea class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none" id="review-content" placeholder="作品の感想を自由に書いてください" rows="6"></textarea>
</div>
<p id="rv-error" class="text-xs text-red-500 font-bold hidden"></p>
<button id="rv-submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all">
                投稿する
            </button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 pb-safe-area-inset-bottom">
<div class="flex items-center justify-around h-16">
<a class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">ホーム</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-medium">検索</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined filled">edit_note</span>
<span class="text-[10px] font-medium">投稿</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">movie</span>
<span class="text-[10px] font-medium">動画</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">マイページ</span>
</a>
</div>
<!-- iPhone Safe Area Handle -->
<div class="h-6 w-full flex justify-center items-end pb-2 lg:hidden">
<div class="w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</nav>
<script>
(function(){
  var id = decodeURIComponent((location.pathname.match(/\/review\/add\/(.+)/) || [])[1] || '');
  if (!id) return;

  // 作品情報取得
  fetch('/api/product/' + encodeURIComponent(id))
    .then(function(r){ return r.json(); })
    .then(function(p){
      var img = document.getElementById('rv-img');
      if (img && p.main_image_url) img.src = p.main_image_url;
      var ttl = document.getElementById('rv-title');
      if (ttl) ttl.textContent = p.title || '';
      var meta = document.getElementById('rv-meta');
      if (meta) {
        var parts = [];
        if (p.actresses) parts.push(p.actresses.split(',')[0].trim());
        if (p.sale_start_date) parts.push(p.sale_start_date.slice(0,4) + '年');
        meta.textContent = parts.join(' · ');
      }
    }).catch(function(){});

  // 星評価
  var rating = 0;
  var labels = ['','残念','いまいち','ふつう','満足','感動した！'];
  var stars = document.querySelectorAll('#rv-stars [data-star]');
  function updateStars(n) {
    stars.forEach(function(s) {
      var v = Number(s.getAttribute('data-star'));
      if (v <= n) {
        s.classList.remove('text-slate-300','dark:text-slate-700');
        s.classList.add('text-primary','filled');
        s.style.fontVariationSettings = "'FILL' 1";
      } else {
        s.classList.remove('text-primary','filled');
        s.classList.add('text-slate-300');
        s.style.fontVariationSettings = "'FILL' 0";
      }
    });
    document.getElementById('rv-score').textContent = n > 0 ? n + '.0' : '-';
    document.getElementById('rv-label').textContent = labels[n] || 'タップして評価';
  }
  stars.forEach(function(s) {
    s.addEventListener('click', function() {
      rating = Number(s.getAttribute('data-star'));
      updateStars(rating);
    });
  });

  // フォーム送信
  document.getElementById('rv-submit').addEventListener('click', function() {
    var comment = document.getElementById('review-content').value.trim();
    var errEl = document.getElementById('rv-error');
    if (!rating) { errEl.textContent = '評価を選択してください'; errEl.classList.remove('hidden'); return; }
    if (!comment) { errEl.textContent = 'レビュー本文を入力してください'; errEl.classList.remove('hidden'); return; }
    errEl.classList.add('hidden');

    var btn = document.getElementById('rv-submit');
    btn.disabled = true; btn.textContent = '送信中...';

    var sid = localStorage.getItem('session_id') || '';
    if (!sid) { sid = crypto.randomUUID(); localStorage.setItem('session_id', sid); }

    fetch('/api/review/' + encodeURIComponent(id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-session-id': sid },
      body: JSON.stringify({ stars: rating, title: document.getElementById('review-title').value.trim() || undefined, comment: comment })
    })
    .then(function(r){ return r.json(); })
    .then(function(){ location.href = '/review/success?from=' + encodeURIComponent(id); })
    .catch(function(){ btn.disabled = false; btn.textContent = '投稿する'; errEl.textContent = 'エラーが発生しました'; errEl.classList.remove('hidden'); });
  });
})();
</script>
</body></html>
