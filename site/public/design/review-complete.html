<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-3 bg-white dark:bg-background-dark border-b border-slate-200 dark:border-slate-800">
<button class="flex items-center justify-center p-2 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-lg font-bold">投稿完了</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex flex-1 flex-col items-center justify-center px-6 py-12 text-center">
<!-- Success Icon Section -->
<div class="mb-8 flex h-24 w-24 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined !text-6xl" style='font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 48;'>check_circle</span>
</div>
<!-- Message Section -->
<div class="mb-10 space-y-3">
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">投稿が完了しました</h2>
<p class="text-slate-600 dark:text-slate-400">レビューありがとうございます。<br/>あなたの感想が他のユーザーの参考になります。</p>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-xs mx-auto space-y-4">
<a class="flex h-12 w-full items-center justify-center rounded-full bg-primary font-bold text-white shadow-lg transition-transform hover:scale-[1.02] active:scale-[0.98]" href="#">作品ページに戻る</a>
<a class="flex h-12 w-full items-center justify-center rounded-full bg-white border-2 border-primary font-bold text-primary shadow-sm transition-transform hover:scale-[1.02] active:scale-[0.98] dark:bg-transparent" href="#">ホーム画面に戻る</a>
</div>
</main>
<!-- Spacer for Bottom Nav -->
<div class="h-20"></div>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pb-safe pt-2">
<div class="mx-auto flex max-w-md items-center justify-between">
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium leading-none">ホーム</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-medium leading-none">検索</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">trending_up</span>
<span class="text-[10px] font-medium leading-none">ランキング</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">play_circle</span>
<span class="text-[10px] font-medium leading-none">動画</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>person</span>
<span class="text-[10px] font-medium leading-none">マイページ</span>
</a>
</div>
<!-- Bottom safe area padding for iPhone indicator -->
<div class="h-6"></div>
</nav>
</div>
</body></html>
