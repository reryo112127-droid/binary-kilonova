name: Daily Update (FANZA + MGS)

on:
  schedule:
    - cron: '5 15 * * *'   # FANZA: 深夜 0:05 JST (= 15:05 UTC)
    - cron: '5 1 * * *'    # MGS:  午前 10:05 JST (=  01:05 UTC)
  workflow_dispatch:         # 手動実行（両方実行）

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  fanza-update:
    name: FANZA 日次更新
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 15 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run FANZA daily update
        run: node scripts/fanza_daily_update.js
        env:
          DMM_API_ID:        ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:  ${{ secrets.DMM_AFFILIATE_ID }}
          DMM_AFFILIATE_IDS: ${{ secrets.DMM_AFFILIATE_IDS }}
          TURSO_FANZA_URL:   ${{ secrets.TURSO_FANZA_URL }}
          TURSO_FANZA_TOKEN: ${{ secrets.TURSO_FANZA_TOKEN }}

      # actress_profiles.json が更新されたらコミット
      # Vercel Hobby はボットコミットをブロックするため [vercel skip] を付ける
      - name: Commit updated actress profiles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actress_profiles.json || true
          if ! git diff --staged --quiet; then
            git commit -m "fanza: update actress profiles [skip ci] [vercel skip]"
            git pull --rebase origin main || true
            git push
          fi

  mgs-update:
    name: MGS 日次更新
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 1 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run MGS daily update
        run: node scripts/phase3_daily_update.js
        env:
          TURSO_MGS_URL:   ${{ secrets.TURSO_MGS_URL }}
          TURSO_MGS_TOKEN: ${{ secrets.TURSO_MGS_TOKEN }}
      # APIルートはforce-dynamicのため再デプロイ不要。Turso更新後すぐサイトに反映される。
